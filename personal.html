
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://simonefalcomer.art/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer — Personal Projects</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#008080;font-family:'IBM Plex Mono',monospace;min-height:100%;display:flex;align-items:center;justify-content:center;}

/* Win95 window */
.win{
  background:#c0c0c0;
  border:2px solid;
  border-color:#fff #808080 #808080 #fff;
  box-shadow:2px 2px 0 #000;
  width:min(600px, 96vw);
  min-height:400px;
  display:flex;flex-direction:column;
  margin:20px;
}
.winbar{
  height:24px;
  background:linear-gradient(to right,#000080,#1084d0);
  display:flex;align-items:center;padding:0 6px;
  justify-content:space-between;
  flex-shrink:0;
}
.wintitle{
  color:#fff;font-size:12px;font-weight:700;
  font-family:'IBM Plex Mono',monospace;
  letter-spacing:0.05em;
}
.winbtns{display:flex;gap:2px;}
.wbtn{
  width:16px;height:14px;background:#c0c0c0;
  font-size:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border:1px solid;border-color:#fff #808080 #808080 #fff;
  text-decoration:none;color:#000;
}
.wbtn:hover{background:#e0e0e0;}

.menubar{
  display:flex;gap:0;
  border-bottom:1px solid #808080;
  padding:2px 4px;
  font-size:11px;
  flex-shrink:0;
}
.menubar span{
  padding:2px 8px;cursor:default;
}
.menubar span:hover{background:#000080;color:#fff;}

.winbody{
  flex:1;padding:16px;
  display:flex;flex-direction:column;gap:8px;
}

.address-bar{
  display:flex;align-items:center;gap:8px;
  padding:4px 6px;
  border:1px solid;border-color:#808080 #fff #fff #808080;
  background:#fff;
  font-size:11px;margin-bottom:8px;
}
.address-bar span{color:#000080;}

/* Folders grid */
.folders{
  display:flex;flex-wrap:wrap;gap:24px;padding:8px;
}

.folder-item{
  display:flex;flex-direction:column;align-items:center;
  width:80px;cursor:pointer;
  text-align:center;
}
.folder-item:hover .folder-icon{filter:brightness(1.1);}
.folder-item.sel .folder-label{background:#000080;color:#fff;}
.folder-item.sel .folder-icon{opacity:0.75;outline:1px dotted #000;}

.folder-icon{
  width:52px;height:44px;
  margin:0 auto 4px;
  display:block;
  image-rendering:pixelated;
}
.folder-label{
  font-size:11px;font-family:'IBM Plex Mono',monospace;
  line-height:1.3;word-break:break-word;
  padding:1px 3px;
  color:#000;
}

/* Status bar */
.statusbar{
  height:22px;
  border-top:1px solid #808080;
  display:flex;align-items:center;
  padding:0 8px;
  font-size:10px;color:#000;
  flex-shrink:0;
  gap:8px;
}
.status-section{
  border:1px solid;border-color:#808080 #fff #fff #808080;
  padding:2px 8px;height:16px;display:flex;align-items:center;
}

/* Back link */
#back-btn{
  position:fixed;top:16px;left:16px;
  font-size:11px;letter-spacing:0.1em;
  color:#fff;text-decoration:none;
  font-family:'IBM Plex Mono',monospace;
  background:rgba(0,0,0,0.4);
  padding:6px 12px;
  border:1px solid rgba(255,255,255,0.3);
}
#back-btn:hover{background:rgba(0,0,0,0.7);}
</style>
</head>
<body>

<a href="https://simonefalcomer.art" id="back-btn">← BACK</a>

<div class="win">
  <div class="winbar">
    <div class="wintitle">📁 Personal Projects</div>
    <div class="winbtns">
      <div class="wbtn">_</div>
      <div class="wbtn">□</div>
      <a href="https://simonefalcomer.art" class="wbtn">✕</a>
    </div>
  </div>
  <div class="menubar">
    <span>File</span>
    <span>Edit</span>
    <span>View</span>
    <span>Help</span>
  </div>
  <div class="winbody">
    <div class="address-bar">
      📂 <span>C:\Simone\Personal Projects</span>
    </div>
    <div class="folders" id="folders">
      <!-- Folders generated by JS -->
    </div>
  </div>
  <div class="statusbar">
    <div class="status-section">3 objects</div>
  </div>
</div>

<script>
var FOLDERS = [
  {name:'Black & White\nArchive', url:'https://simonefalcomer.art/bw.html'},
  {name:'Colour\nArchive',        url:'INSERISCI_URL_COLOUR'},
  {name:'Portraits',              url:'INSERISCI_URL_PORTRAITS'},
];

function makeFolderIcon(){
  var c=document.createElement('canvas');c.width=52;c.height=44;
  var x=c.getContext('2d');
  x.fillStyle='#e8c000';x.fillRect(0,8,48,34);
  x.fillStyle='#ffd700';x.fillRect(0,4,18,6);
  x.fillStyle='#b89000';x.fillRect(0,40,48,2);x.fillRect(46,8,2,34);
  x.fillStyle='rgba(255,255,255,0.25)';x.fillRect(0,8,48,6);
  var img=document.createElement('img');img.src=c.toDataURL();
  img.className='folder-icon';return img;
}

var container=document.getElementById('folders');
FOLDERS.forEach(function(f){
  var item=document.createElement('div');item.className='folder-item';
  item.appendChild(makeFolderIcon());
  var lbl=document.createElement('div');lbl.className='folder-label';
  lbl.textContent=f.name;
  item.appendChild(lbl);
  item.addEventListener('click',function(){
    document.querySelectorAll('.folder-item').forEach(function(i){i.classList.remove('sel');});
    item.classList.add('sel');
  });
  item.addEventListener('dblclick',function(){
    if(f.url && f.url.indexOf('INSERISCI')<0) window.location.href=f.url;
  });
  // mobile: single tap opens
  var lastTap=0;
  item.addEventListener('touchend',function(){
    var now=Date.now();
    if(now-lastTap<400){
      if(f.url && f.url.indexOf('INSERISCI')<0) window.location.href=f.url;
    }
    lastTap=now;
  });
  container.appendChild(item);
});
</script>
</body>
</html>
