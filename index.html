<html lang="en">
<head>

<title>Simone Falcomer — Photographer & Art Director</title>
<meta name="description" content="Simone Falcomer is a photographer and Art Director based in Barcelona. Editorial work in Vogue Nederland, Neo2, Vein Magazine, Cake Magazine. Clients include Marni, Outsiders Division.">
<meta name="keywords" content="Simone Falcomer, photographer Barcelona, art director, fashion photography, Vogue Nederland, Neo2, Marni">
<meta name="author" content="Simone Falcomer">
<meta property="og:title" content="Simone Falcomer — Photographer & Art Director">
<meta property="og:description" content="Photographer and Art Director based in Barcelona.">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'IBM Plex Mono',monospace;}
body.win95{background:#008080;}
body.macos{background:#1d1d1f;}

.phantom{position:fixed;pointer-events:none;z-index:99998;opacity:0;transition:opacity 3s ease;white-space:nowrap;font-family:'IBM Plex Mono',monospace;font-size:clamp(9px,1.2vw,13px);letter-spacing:0.3em;}
body.win95 .phantom{color:rgba(255,255,255,0.13);}
body.macos .phantom{color:rgba(255,255,255,0.08);}
.phantom.visible{opacity:1;}

/* ══ WIN95 ══ */
#w95-layer{position:fixed;inset:0;pointer-events:none;z-index:9999;}
#w95-taskbar{position:fixed;bottom:0;left:0;right:0;height:30px;background:#c0c0c0;border-top:1px solid #fff;display:flex;align-items:center;padding:0 6px;gap:4px;pointer-events:all;z-index:100;}
#w95-start{height:22px;padding:0 10px;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:5px;letter-spacing:0.05em;}
#w95-start:active{border-color:#808080 #fff #fff #808080;}
#w95-start-logo{width:14px;height:14px;display:grid;grid-template-columns:1fr 1fr;gap:1px;flex-shrink:0;}
#w95-start-logo span{display:block;}
#w95-taskbar-social{display:flex;align-items:center;gap:2px;margin-left:4px;}
.w95-social-btn{width:22px;height:22px;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
.w95-social-btn:active{border-color:#808080 #fff #fff #808080;}
#w95-weather{height:22px;padding:0 8px;background:#c0c0c0;border:1px solid;border-color:#808080 #fff #fff #808080;font-size:10px;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;white-space:nowrap;}
#w95-clock{height:22px;padding:0 8px;background:#c0c0c0;border:1px solid;border-color:#808080 #fff #fff #808080;font-size:11px;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;letter-spacing:0.1em;white-space:nowrap;}
#w95-start-menu{position:fixed;bottom:30px;left:0;width:240px;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;display:none;flex-direction:row;z-index:200;box-shadow:2px 2px 0 #000;pointer-events:all;}
#w95-start-menu.open{display:flex;}
#w95-start-menu-stripe{width:22px;background:#000080;display:flex;align-items:flex-end;padding:6px 4px;writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:#c0c0c0;font-weight:700;letter-spacing:3px;flex-shrink:0;}
#w95-start-menu-items{flex:1;padding:4px 0;overflow-y:auto;max-height:80vh;}
.w95-menu-item{padding:7px 14px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:10px;white-space:nowrap;font-family:'IBM Plex Mono',monospace;}
.w95-menu-item:hover{background:#000080;color:#fff;}
.w95-menu-sep{height:1px;background:#808080;margin:3px 8px;}

.w95-icon{position:absolute;pointer-events:all;cursor:default;text-align:center;width:64px;}
.w95-icon-img{margin:0 auto;display:block;}
.w95-icon-img.square{width:52px;height:52px;object-fit:contain;object-position:center;border:1px solid rgba(0,0,0,0.3);background:#111;}
.w95-icon-img.natural{width:auto;max-width:64px;height:auto;max-height:80px;object-fit:contain;border:1px solid rgba(0,0,0,0.3);}
.w95-icon-label{margin-top:3px;font-size:9px;line-height:1.3;word-break:break-word;font-family:'IBM Plex Mono',monospace;}
body.win95 .w95-icon-label{color:#fff;text-shadow:1px 1px 0 #000,0 0 4px rgba(0,0,0,0.8);}
body.macos .w95-icon-label{color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.9);}
.w95-icon.sel .w95-icon-label{background:#000080;color:#fff;}
.w95-icon.sel .w95-icon-img{opacity:0.75;outline:1px solid #000080;}

.w95-win{position:fixed;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;box-shadow:2px 2px 0 #000;display:none;flex-direction:column;pointer-events:all;min-width:200px;}
.w95-win.open{display:flex;}
.w95-winbar{height:20px;background:linear-gradient(to right,#000080,#1084d0);display:flex;align-items:center;padding:0 4px;cursor:grab;user-select:none;flex-shrink:0;}
.w95-winbar:active{cursor:grabbing;}
.w95-wintitle{flex:1;font-size:11px;color:#fff;font-weight:700;pointer-events:none;white-space:nowrap;overflow:hidden;font-family:'IBM Plex Mono',monospace;}
.w95-winbtns{display:flex;gap:2px;}
.w95-wbtn{width:16px;height:14px;background:#c0c0c0;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;border:1px solid;border-color:#fff #808080 #808080 #fff;line-height:1;}
.w95-wbtn:active{border-color:#808080 #fff #fff #808080;}
.w95-winbody{flex:1;overflow:hidden;background:#c0c0c0;font-size:12px;color:#000;font-family:'IBM Plex Mono',monospace;}
.w95-winbody.padded{padding:16px;overflow-y:auto;}
.w95-winbody iframe{width:100%;height:100%;border:none;display:block;}
.w95-winbody h1{font-size:13px;font-weight:700;margin-bottom:4px;}
.w95-winbody h2{font-size:10px;color:#555;margin-bottom:14px;}
.w95-winbody a{color:#000080;font-size:11px;display:block;margin-bottom:8px;text-decoration:none;}
.w95-win-openlink{display:block;text-align:center;font-size:10px;font-family:'IBM Plex Mono',monospace;background:#c0c0c0;border-top:1px solid #808080;padding:4px;color:#000080;text-decoration:none;flex-shrink:0;cursor:pointer;}
.w95-win-openlink:hover{background:#000080;color:#fff;}
.w95-resize{position:absolute;right:0;bottom:0;width:14px;height:14px;cursor:se-resize;opacity:0.5;}

/* AI Win95 */
.ai-winbody{display:flex;flex-direction:column;height:100%;}
.ai-messages{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
.ai-msg{font-size:11px;font-family:'IBM Plex Mono',monospace;line-height:1.6;padding:6px 8px;max-width:92%;}
.ai-msg.user{background:#000080;color:#fff;align-self:flex-end;}
.ai-msg.bot{background:#e8e8e8;color:#000;align-self:flex-start;border:1px solid #ccc;}
.ai-msg.loading{color:#808080;font-style:italic;}
.ai-input-row{display:flex;border-top:1px solid #808080;flex-shrink:0;}
.ai-input{flex:1;border:none;padding:6px 8px;font-size:11px;font-family:'IBM Plex Mono',monospace;background:#fff;outline:none;}
.ai-send{padding:6px 10px;background:#c0c0c0;border:none;border-left:1px solid #808080;cursor:pointer;font-size:11px;font-family:'IBM Plex Mono',monospace;}
.ai-send:hover{background:#000080;color:#fff;}
.ai-send:disabled{opacity:0.5;cursor:default;}
.ai-counter{font-size:9px;font-family:'IBM Plex Mono',monospace;color:#808080;padding:2px 8px;background:#c0c0c0;border-top:1px solid #ddd;flex-shrink:0;text-align:right;}

/* ══ MACOS ══ */
#mac-layer{position:fixed;inset:0;pointer-events:none;z-index:9999;display:none;}
body.macos #mac-layer{display:block;}
body.macos #w95-layer{display:none;}

/* Menubar macOS fedele */
#mac-menubar{
  position:fixed;top:0;left:0;right:0;height:28px;
  background:rgba(30,30,30,0.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;
  pointer-events:all;z-index:100;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
}
#mac-apple-btn{
  width:48px;height:28px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;user-select:none;flex-shrink:0;
}
#mac-apple-btn:hover{background:rgba(255,255,255,0.1);}
#mac-apple-svg{width:16px;height:16px;}
#mac-apple-menu{
  position:fixed;top:28px;left:4px;
  background:rgba(30,30,30,0.96);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;
  box-shadow:0 12px 40px rgba(0,0,0,0.6);
  display:none;flex-direction:column;
  min-width:210px;padding:5px 0;
  z-index:300;pointer-events:all;
}
#mac-apple-menu.open{display:flex;}
.mac-apple-item{
  padding:5px 16px;font-size:13px;
  font-family:-apple-system,sans-serif;
  cursor:pointer;color:rgba(255,255,255,0.9);
  display:flex;align-items:center;gap:8px;
}
.mac-apple-item:hover{background:rgba(255,255,255,0.12);}
.mac-apple-sep{height:1px;background:rgba(255,255,255,0.1);margin:4px 0;}
#mac-menubar-words{display:flex;align-items:center;gap:2px;margin-left:4px;}
.mac-menu-word{
  padding:0 10px;height:28px;display:flex;align-items:center;
  font-size:13px;font-family:-apple-system,sans-serif;
  cursor:pointer;color:rgba(255,255,255,0.85);font-weight:400;
}
.mac-menu-word:hover{background:rgba(255,255,255,0.1);border-radius:4px;}
#mac-menubar-right{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  font-size:13px;font-family:-apple-system,sans-serif;
  color:rgba(255,255,255,0.85);padding-right:12px;
}
#mac-weather-display{opacity:0.8;}
#mac-clock-display{font-weight:400;}

/* Dock macOS */
#mac-dock{
  position:fixed;right:10px;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;padding:10px 6px;
  display:flex;flex-direction:column;gap:8px;
  pointer-events:all;z-index:100;
  box-shadow:0 8px 40px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.15);
}
.mac-dock-icon{
  width:54px;height:54px;border-radius:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s cubic-bezier(.34,1.8,.64,1);
  overflow:visible;position:relative;flex-shrink:0;
}
.mac-dock-icon:hover{transform:scale(1.65);}
.mac-dock-icon:active{transform:scale(0.88);}
.mac-dock-icon img{width:100%;height:100%;object-fit:cover;border-radius:13px;display:block;box-shadow:0 2px 8px rgba(0,0,0,0.4);}
.mac-dock-icon.folder-icon{background:linear-gradient(145deg,#5eb5f7,#2d8fd4);box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.mac-dock-icon.doc-icon{background:linear-gradient(145deg,#f5f5f5,#ddd);border:1px solid #ccc;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.mac-dock-icon.pc-icon{background:linear-gradient(145deg,#555,#222);box-shadow:0 2px 8px rgba(0,0,0,0.4);}
.mac-dock-icon.ai-icon{background:linear-gradient(135deg,#a855f7,#7c3aed,#4f46e5);box-shadow:0 2px 8px rgba(124,58,237,0.5);}
.mac-dock-label{
  position:absolute;right:calc(100% + 10px);top:50%;transform:translateY(-50%);
  white-space:nowrap;font-size:12px;
  font-family:-apple-system,sans-serif;
  background:rgba(20,20,20,0.9);color:#fff;
  padding:4px 10px;border-radius:6px;
  opacity:0;pointer-events:none;
  transition:opacity 0.15s;z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.mac-dock-icon:hover .mac-dock-label{opacity:1;}

/* macOS windows */
.mac-win{position:fixed;background:rgba(28,28,28,0.95);border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,0.6);display:none;flex-direction:column;pointer-events:all;min-width:300px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);}
.mac-win.open{display:flex;}
.mac-winbar{height:30px;background:rgba(40,40,40,0.95);display:flex;align-items:center;padding:0 12px;cursor:grab;user-select:none;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);}
.mac-winbar:active{cursor:grabbing;}
.mac-winbtns{display:flex;gap:8px;align-items:center;}
.mac-wbtn{width:13px;height:13px;border-radius:50%;cursor:pointer;flex-shrink:0;border:none;padding:0;box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);}
.mac-wintitle{flex:1;text-align:center;font-size:13px;color:rgba(255,255,255,0.6);font-family:-apple-system,sans-serif;pointer-events:none;font-weight:400;}
.mac-winbody{flex:1;overflow:hidden;font-size:13px;font-family:-apple-system,sans-serif;color:#fff;}
.mac-winbody.padded{padding:20px;overflow-y:auto;}
.mac-winbody iframe{width:100%;height:100%;border:none;}
.mac-win-openlink{display:block;text-align:center;font-size:12px;font-family:-apple-system,sans-serif;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.08);padding:8px;color:#64b5f6;text-decoration:none;flex-shrink:0;cursor:pointer;}
.mac-win-openlink:hover{background:rgba(255,255,255,0.08);}

/* AI macOS */
.mac-ai-body{display:flex;flex-direction:column;height:100%;}
.mac-ai-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.mac-ai-msg{font-size:13px;font-family:-apple-system,sans-serif;line-height:1.6;padding:9px 13px;border-radius:16px;max-width:85%;}
.mac-ai-msg.user{background:#0a7aff;color:#fff;align-self:flex-end;border-radius:16px 16px 4px 16px;}
.mac-ai-msg.bot{background:rgba(255,255,255,0.12);color:#fff;align-self:flex-start;border-radius:16px 16px 16px 4px;}
.mac-ai-msg.loading{color:rgba(255,255,255,0.5);font-style:italic;}
.mac-ai-input-row{display:flex;border-top:1px solid rgba(255,255,255,0.08);padding:10px;gap:8px;flex-shrink:0;align-items:center;}
.mac-ai-input{flex:1;border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:8px 14px;font-size:13px;font-family:-apple-system,sans-serif;outline:none;background:rgba(255,255,255,0.08);color:#fff;}
.mac-ai-input::placeholder{color:rgba(255,255,255,0.4);}
.mac-ai-send{padding:8px 16px;background:#0a7aff;color:#fff;border:none;border-radius:20px;cursor:pointer;font-size:13px;font-family:-apple-system,sans-serif;}
.mac-ai-send:disabled{opacity:0.4;cursor:default;}
.mac-ai-counter{font-size:11px;font-family:-apple-system,sans-serif;color:rgba(255,255,255,0.4);padding:0 14px 8px;flex-shrink:0;text-align:right;}

#w95-hourglass{position:fixed;inset:0;background:#008080;z-index:999999;display:flex;align-items:center;justify-content:center;pointer-events:all;transition:opacity 0.6s;}
#w95-hourglass-inner{font-size:28px;color:#fff;animation:hgspin 1s linear infinite;}
@keyframes hgspin{0%,49%{transform:rotate(0deg);}50%,100%{transform:rotate(180deg);}}

@media(max-width:768px){
  .w95-icon{width:56px;}
  .w95-icon-img.square{width:44px;height:44px;}
  .w95-icon-label{font-size:8px;}
  #mac-dock{padding:6px 4px;gap:5px;}
  .mac-dock-icon{width:44px;height:44px;}
  #mac-menubar-words{display:none;}
}
</style>
</head>

<script>

function makeAIIcon(){

  x.fillStyle=g;x.beginPath();x.roundRect(0,0,52,52,10);x.fill();
  x.fillStyle='rgba(255,255,255,0.9)';
  x.beginPath();x.arc(18,26,5,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(34,26,5,0,Math.PI*2);x.fill();
  x.fillStyle='#7c3aed';
  x.beginPath();x.arc(18,26,2.5,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(34,26,2.5,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(255,255,255,0.9)';x.lineWidth=2.5;x.lineCap='round';
  x.beginPath();x.moveTo(16,35);x.quadraticCurveTo(26,40,36,35);x.stroke();
  x.beginPath();x.moveTo(26,16);x.lineTo(26,9);x.stroke();
  x.fillStyle='rgba(255,255,255,0.9)';x.beginPath();x.arc(26,8,3.5,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(255,255,255,0.5)';x.lineWidth=1.5;
  x.beginPath();x.moveTo(10,26);x.lineTo(13,26);x.stroke();
  x.beginPath();x.moveTo(39,26);x.lineTo(42,26);x.stroke();

function makeBaseWin(name,wW,wH){
  var w=document.createElement('div');w.className='w95-win';
  wW=wW||(isMobile?Math.min(W-20,360):420);
  wH=wH||(isMobile?Math.min(H-80,500):460);
  w.style.cssText='left:20px;top:20px;width:'+wW+'px;height:'+wH+'px;z-index:'+(++zTop)+';';
  var bar=document.createElement('div');bar.className='w95-winbar';
  var title=document.createElement('div');title.className='w95-wintitle';title.textContent=name;bar.appendChild(title);
  var btns=document.createElement('div');btns.className='w95-winbtns';
  function wbtn(l,fn){var b=document.createElement('button');b.className='w95-wbtn';b.textContent=l;b.addEventListener('click',function(e){e.stopPropagation();fn();});return b;}
  btns.appendChild(wbtn('_',function(){w.classList.remove('open');}));
  btns.appendChild(wbtn('□',function(){
    if(w._max){w.style.left=w._pl;w.style.top=w._pt;w.style.width=w._pw;w.style.height=w._ph;w._max=false;}
    else{w._pl=w.style.left;w._pt=w.style.top;w._pw=w.style.width;w._ph=w.style.height;w.style.left='0';w.style.top='0';w.style.width='100vw';w.style.height='calc(100vh - 30px)';w._max=true;}
  }));
  btns.appendChild(wbtn('✕',function(){w.classList.remove('open');}));
  bar.appendChild(btns);w.appendChild(bar);
  w.addEventListener('mousedown',function(){bringToFront(w);});
  var bd=false,bx=0,by=0;
  bar.addEventListener('mousedown',function(e){if(e.target.closest('.w95-winbtns'))return;e.preventDefault();bd=true;bx=e.clientX-w.offsetLeft;by=e.clientY-w.offsetTop;bringToFront(w);});
  document.addEventListener('mousemove',function(e){if(!bd)return;w.style.left=Math.max(0,e.clientX-bx)+'px';w.style.top=Math.max(0,e.clientY-by)+'px';});
  document.addEventListener('mouseup',function(){bd=false;});
  winLayer.appendChild(w);return w;
}

  rsz.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();rz=true;rx=e.clientX;ry=e.clientY;rw=w.offsetWidth;rh=w.offsetHeight;});

function makeAIWin(){
  var w=makeBaseWin('Chat with Simone AI',isMobile?Math.min(W-20,340):380,isMobile?Math.min(H-80,460):480);
  var body=document.createElement('div');body.className='w95-winbody';
  var inner=document.createElement('div');inner.className='ai-winbody';
  var msgs=document.createElement('div');msgs.className='ai-messages';
  var counter=document.createElement('div');counter.className='ai-counter';counter.textContent='5 questions remaining';
  var inputRow=document.createElement('div');inputRow.className='ai-input-row';
  var input=document.createElement('input');input.className='ai-input';input.type='text';input.placeholder='Ask me about Simone...';
  var send=document.createElement('button');send.className='ai-send';send.textContent='Send';
  inputRow.appendChild(input);inputRow.appendChild(send);
  inner.appendChild(msgs);inner.appendChild(counter);inner.appendChild(inputRow);
  body.appendChild(inner);w.appendChild(body);
  var welcome=document.createElement('div');welcome.className='ai-msg bot';
  welcome.textContent='Hi! I\'m Simone\'s AI — ask me anything about his work, projects, or background. You have 5 questions!';
  msgs.appendChild(welcome);
  var qLeft=5,history=[];
  function sendMsg(){
    if(qLeft<=0)return;
    var text=input.value.trim();if(!text)return;
    input.value='';
    var um=document.createElement('div');um.className='ai-msg user';um.textContent=text;msgs.appendChild(um);
    qLeft--;counter.textContent=qLeft+' question'+(qLeft===1?'':'s')+' remaining';
    if(qLeft===0){input.disabled=true;send.disabled=true;}
    var loading=document.createElement('div');loading.className='ai-msg bot loading';loading.textContent='Thinking...';msgs.appendChild(loading);
    msgs.scrollTop=msgs.scrollHeight;
    history.push({role:'user',content:text});
    fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history,system:AI_SYSTEM})})
    .then(function(r){return r.json();})
    .then(function(d){
      loading.remove();
      var reply=d.content&&d.content[0]?d.content[0].text:'Sorry, something went wrong. Try again!';
      history.push({role:'assistant',content:reply});
      var bm=document.createElement('div');bm.className='ai-msg bot';bm.textContent=reply;msgs.appendChild(bm);
      msgs.scrollTop=msgs.scrollHeight;
      if(qLeft===0){var end=document.createElement('div');end.className='ai-msg bot';end.style.fontStyle='italic';end.textContent='Session ended. Write directly to falcomersimone@gmail.com!';msgs.appendChild(end);}
    }).catch(function(){
      loading.remove();qLeft++;counter.textContent=qLeft+' questions remaining';
      if(qLeft>0){input.disabled=false;send.disabled=false;}
      var err=document.createElement('div');err.className='ai-msg bot';err.textContent='Connection issue — please try again!';msgs.appendChild(err);
    });
  }
  send.addEventListener('click',sendMsg);
  input.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
  return w;
}

    },400);
  }
  function startDrag(cx,cy){dragging=true;moved=false;ox=cx-ic.offsetLeft;oy=cy-ic.offsetTop;sx=cx;sy=cy;ic.style.zIndex=++zTop;document.querySelectorAll('.w95-icon').forEach(function(w){w.classList.remove('sel');});ic.classList.add('sel');}
  function doDrag(cx,cy){if(!dragging)return;if(Math.abs(cx-sx)>6||Math.abs(cy-sy)>6)moved=true;ic.style.left=Math.max(0,cx-ox)+'px';ic.style.top=Math.max(0,cy-oy)+'px';}
  function endDrag(){if(!dragging)return;dragging=false;if(!moved){if(isMobile){openItem();}else{var now=Date.now();if(now-lastTap<500)openItem();lastTap=now;}}}
  ic.addEventListener('mousedown',function(e){e.preventDefault();startDrag(e.clientX,e.clientY);});
  ic.addEventListener('touchstart',function(e){e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  document.addEventListener('mousemove',function(e){doDrag(e.clientX,e.clientY);});
  document.addEventListener('touchmove',function(e){if(dragging)doDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('mouseup',endDrag);
  document.addEventListener('touchend',endDrag);
  iconLayer.appendChild(ic);
});

document.addEventListener('click',function(e){
  if(!e.target.closest('.w95-icon'))document.querySelectorAll('.w95-icon').forEach(function(w){w.classList.remove('sel');});
  if(!e.target.closest('#w95-start')&&!e.target.closest('#w95-start-menu'))document.getElementById('w95-start-menu').classList.remove('open');
});

// macOS Dock
function buildMacDock(){
  var dock=document.getElementById('mac-dock');
  var macWins=document.getElementById('mac-wins');
  dock.innerHTML='';macWins.innerHTML='';

  FOLDERS.forEach(function(f){
    var di=document.createElement('div');di.className='mac-dock-icon';

    if(f.icon==='ai'){
      di.classList.add('ai-icon');
      di.innerHTML='<svg width="30" height="30" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" fill="white"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M4.9 19.1L7 17M17 7l2.1-2.1" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>';
    } else if(f.icon==='photo'&&f.photoUrl){
      var img=document.createElement('img');img.src=f.photoUrl;di.appendChild(img);
    } else if(f.icon==='folder'){
      di.classList.add('folder-icon');
      di.innerHTML='<svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>';
    } else if(f.icon==='doc'){
      di.classList.add('doc-icon');
      di.innerHTML='<svg width="24" height="28" viewBox="0 0 24 28" fill="none"><rect x="1" y="0" width="22" height="28" rx="3" fill="white" stroke="#ddd"/><path d="M15 0l8 8h-8V0z" fill="#e0e0e0"/><rect x="3" y="11" width="14" height="1.5" rx="1" fill="#ccc"/><rect x="3" y="15" width="12" height="1.5" rx="1" fill="#ccc"/><rect x="3" y="19" width="10" height="1.5" rx="1" fill="#ccc"/></svg>';
    } else if(f.icon==='pc'){
      di.classList.add('pc-icon');
      di.innerHTML='<svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="13" rx="2" fill="white"/><path d="M8 21h8M12 16v5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>';
    } else if(f.icon==='vogue'){
      var img=document.createElement('img');img.src=f.photoUrl;di.appendChild(img);
    }

    var lbl=document.createElement('div');lbl.className='mac-dock-label';lbl.textContent=f.name;di.appendChild(lbl);

    var mwin=null;
    if(f.type==='window'||f.type==='iframe'){
      mwin=document.createElement('div');mwin.className='mac-win';
      var wW2=isMobile?Math.min(W-20,360):420,wH2=isMobile?Math.min(H-80,500):460;
      mwin.style.cssText='left:40px;top:36px;width:'+wW2+'px;height:'+wH2+'px;z-index:'+(++zTop)+';';
      var mbar=document.createElement('div');mbar.className='mac-winbar';
      var mbtns=document.createElement('div');mbtns.className='mac-winbtns';
      function mbtn(col,fn){var b=document.createElement('div');b.className='mac-wbtn';b.style.background=col;b.addEventListener('click',function(e){e.stopPropagation();fn();});return b;}
      mbtns.appendChild(mbtn('#ff5f57',function(){mwin.classList.remove('open');}));
      mbtns.appendChild(mbtn('#febc2e',function(){mwin.classList.remove('open');}));
      mbtns.appendChild(mbtn('#28c840',function(){
        if(mwin._max){mwin.style.left=mwin._pl;mwin.style.top=mwin._pt;mwin.style.width=mwin._pw;mwin.style.height=mwin._ph;mwin._max=false;}
        else{mwin._pl=mwin.style.left;mwin._pt=mwin.style.top;mwin._pw=mwin.style.width;mwin._ph=mwin.style.height;mwin.style.left='0';mwin.style.top='28px';mwin.style.width='100vw';mwin.style.height='calc(100vh - 28px)';mwin._max=true;}
      }));
      mbar.appendChild(mbtns);
      var mtitle=document.createElement('div');mtitle.className='mac-wintitle';mtitle.textContent=f.name;mbar.appendChild(mtitle);
      var mbody=document.createElement('div');mbody.className='mac-winbody';
      if(f.content){mbody.classList.add('padded');mbody.innerHTML=f.content;}
      else if(f.type==='iframe'){
        var mif=document.createElement('iframe');mif.src='about:blank';mbody.appendChild(mif);
        var mol=document.createElement('a');mol.href=f.url;mol.target='_blank';mol.className='mac-win-openlink';mol.textContent='↗ Open in original website';mwin.appendChild(mol);
        mwin._iframe=mif;mwin._iframeUrl=f.url;
      }
      mwin.appendChild(mbar);mwin.appendChild(mbody);
      mwin.addEventListener('mousedown',function(){bringToFront(mwin);});
      var mbd=false,mbx=0,mby=0;
      mbar.addEventListener('mousedown',function(e){if(e.target.closest('.mac-winbtns'))return;e.preventDefault();mbd=true;mbx=e.clientX-mwin.offsetLeft;mby=e.clientY-mwin.offsetTop;bringToFront(mwin);});
      document.addEventListener('mousemove',function(e){if(!mbd)return;mwin.style.left=Math.max(0,e.clientX-mbx)+'px';mwin.style.top=Math.max(28,e.clientY-mby)+'px';});
      document.addEventListener('mouseup',function(){mbd=false;});
      macWins.appendChild(mwin);
    }

    di.addEventListener('click',function(){
      if(f.type==='aiwin'){openAIWin();return;}
      if(f.type==='infowin'){openInfoWin();return;}
      if(f.type==='link'&&f.url&&f.url.indexOf('INSERISCI')<0){window.location.href=f.url;return;}
      if(mwin){mwin.classList.add('open');bringToFront(mwin);if(mwin._iframe&&mwin._iframe.src==='about:blank')mwin._iframe.src=mwin._iframeUrl;}
    });
    dock.appendChild(di);
  });
}
