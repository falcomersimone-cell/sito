function makeAIIcon(){
  var c=document.createElement('canvas');c.width=52;c.height=52;
  var x=c.getContext('2d');
  var g=x.createLinearGradient(0,0,52,52);
  g.addColorStop(0,'#a855f7');g.addColorStop(0.5,'#7c3aed');g.addColorStop(1,'#4f46e5');
  x.fillStyle=g;x.beginPath();x.roundRect(0,0,52,52,10);x.fill();
  x.fillStyle='rgba(255,255,255,0.9)';
  x.beginPath();x.arc(18,26,5,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(34,26,5,0,Math.PI*2);x.fill();
  x.fillStyle='#7c3aed';
  x.beginPath();x.arc(18,26,2.5,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(34,26,2.5,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(255,255,255,0.9)';x.lineWidth=2.5;x.lineCap='round';
  x.beginPath();x.moveTo(16,35);x.quadraticCurveTo(26,41,36,35);x.stroke();
  x.beginPath();x.moveTo(26,16);x.lineTo(26,9);x.stroke();
  x.fillStyle='rgba(255,255,255,0.9)';x.beginPath();x.arc(26,8,3.5,0,Math.PI*2);x.fill();
  var img=document.createElement('img');img.src=c.toDataURL();
  img.style.cssText='width:52px;height:52px;display:block;margin:0 auto;';return img;
}

function makeIcon(type,photoUrl){

  if(type==='doc') return makeDocIcon();
  if(type==='photo'&&photoUrl){var i=document.createElement('img');i.src=photoUrl;i.className='w95-icon-img square';i.style.objectPosition='center';return i;}
  return makeFolderIcon();
}

var iconLayer=document.getElementById('w95-icons');
var winLayer=document.getElementById('w95-wins');
var zTop=1000;
function bringToFront(el){el.style.zIndex=++zTop;}

function showHourglass(){
  var h=document.createElement('div');
  h.style.cssText='position:fixed;inset:0;background:rgba(0,128,128,0.35);z-index:999998;display:flex;align-items:center;justify-content:center;pointer-events:all;';
  h.innerHTML='<div style="font-size:24px;color:#fff;animation:hgspin 1s linear infinite;">⧗</div>';
  document.body.appendChild(h);setTimeout(function(){h.remove();},600);
}

function makeBaseWin(name,wW,wH){
  var w=document.createElement('div');w.className='w95-win';
  wW=wW||(isMobile?Math.min(W-20,360):420);
  wH=wH||(isMobile?Math.min(H-80,500):460);
  w.style.cssText='left:20px;top:20px;width:'+wW+'px;height:'+wH+'px;z-index:'+(++zTop)+';';
  var bar=document.createElement('div');bar.className='w95-winbar';
  var title=document.createElement('div');title.className='w95-wintitle';title.textContent=name;bar.appendChild(title);
  var btns=document.createElement('div');btns.className='w95-winbtns';
  function wbtn(l,fn){var b=document.createElement('button');b.className='w95-wbtn';b.textContent=l;b.addEventListener('click',function(e){e.stopPropagation();fn();});return b;}
  btns.appendChild(wbtn('_',function(){w.classList.remove('open');}));
  btns.appendChild(wbtn('□',function(){
    if(w._max){w.style.left=w._pl;w.style.top=w._pt;w.style.width=w._pw;w.style.height=w._ph;w._max=false;}
    else{w._pl=w.style.left;w._pt=w.style.top;w._pw=w.style.width;w._ph=w.style.height;w.style.left='0';w.style.top='0';w.style.width='100vw';w.style.height='calc(100vh - 30px)';w._max=true;}
  }));
  btns.appendChild(wbtn('✕',function(){w.classList.remove('open');}));
  bar.appendChild(btns);w.appendChild(bar);
  w.addEventListener('mousedown',function(){bringToFront(w);});
  var bd=false,bx=0,by=0;
  bar.addEventListener('mousedown',function(e){if(e.target.closest('.w95-winbtns'))return;e.preventDefault();bd=true;bx=e.clientX-w.offsetLeft;by=e.clientY-w.offsetTop;bringToFront(w);});
  document.addEventListener('mousemove',function(e){if(!bd)return;w.style.left=Math.max(0,e.clientX-bx)+'px';w.style.top=Math.max(0,e.clientY-by)+'px';});
  document.addEventListener('mouseup',function(){bd=false;});
  winLayer.appendChild(w);return w;
}

function makeWin(f){
  var w=makeBaseWin(f.name);
  var body=document.createElement('div');body.className='w95-winbody';if(f.content)body.innerHTML=f.content;
  var rsz=document.createElement('div');rsz.className='w95-resize';
  rsz.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14"><path d="M14 0L0 14M14 7L7 14M14 11L11 14" stroke="#808080" stroke-width="1"/></svg>';
  var rz=false,rx=0,ry=0,rw=0,rh=0;
  rsz.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();rz=true;rx=e.clientX;ry=e.clientY;rw=w.offsetWidth;rh=w.offsetHeight;});
  document.addEventListener('mousemove',function(e){if(!rz)return;w.style.width=Math.max(200,rw+(e.clientX-rx))+'px';w.style.height=Math.max(150,rh+(e.clientY-ry))+'px';});
  document.addEventListener('mouseup',function(){rz=false;});
  w.appendChild(body);w.appendChild(rsz);return w;
}

function makeIframeWin(f){
  var w=makeWin(f);
  var body=w.querySelector('.w95-winbody');
  var iframe=document.createElement('iframe');iframe.src='about:blank';body.appendChild(iframe);
  var ol=document.createElement('a');ol.href=f.url;ol.target='_blank';ol.className='w95-win-openlink';ol.textContent='↗ Open in original website';w.appendChild(ol);
  w._iframe=iframe;w._iframeUrl=f.url;return w;
}

function makeAIWin(){
  var w=makeBaseWin('Chat with Simone AI',isMobile?Math.min(W-20,340):380,isMobile?Math.min(H-80,460):480);
  var body=document.createElement('div');body.className='w95-winbody';
  var inner=document.createElement('div');inner.className='ai-winbody';
  var msgs=document.createElement('div');msgs.className='ai-messages';
  var counter=document.createElement('div');counter.className='ai-counter';counter.textContent='5 questions remaining';
  var inputRow=document.createElement('div');inputRow.className='ai-input-row';
  var input=document.createElement('input');input.className='ai-input';input.type='text';input.placeholder='Ask me about Simone...';
  var send=document.createElement('button');send.className='ai-send';send.textContent='Send';
  inputRow.appendChild(input);inputRow.appendChild(send);
  inner.appendChild(msgs);inner.appendChild(counter);inner.appendChild(inputRow);
  body.appendChild(inner);w.appendChild(body);
  var welcome=document.createElement('div');welcome.className='ai-msg bot';
  welcome.textContent='Hi! I\'m Simone\'s AI — ask me anything about his work, projects, or background. You have 5 questions!';
  msgs.appendChild(welcome);
  var qLeft=5,history=[];
  function sendMsg(){
    if(qLeft<=0)return;
    var text=input.value.trim();if(!text)return;
    input.value='';
    var um=document.createElement('div');um.className='ai-msg user';um.textContent=text;msgs.appendChild(um);
    qLeft--;counter.textContent=qLeft+' question'+(qLeft===1?'':'s')+' remaining';
    if(qLeft===0){input.disabled=true;send.disabled=true;}
    var loading=document.createElement('div');loading.className='ai-msg bot loading';loading.textContent='Thinking...';msgs.appendChild(loading);
    msgs.scrollTop=msgs.scrollHeight;
    history.push({role:'user',content:text});
    fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history,system:AI_SYSTEM})})
    .then(function(r){return r.json();})
    .then(function(d){
      loading.remove();
      var reply=d.content&&d.content[0]?d.content[0].text:'Sorry, something went wrong!';
      history.push({role:'assistant',content:reply});
      var bm=document.createElement('div');bm.className='ai-msg bot';bm.textContent=reply;msgs.appendChild(bm);
      msgs.scrollTop=msgs.scrollHeight;
      if(qLeft===0){var end=document.createElement('div');end.className='ai-msg bot';end.style.fontStyle='italic';end.textContent='Session ended. Write to falcomersimone@gmail.com!';msgs.appendChild(end);}
    }).catch(function(){
      loading.remove();qLeft++;counter.textContent=qLeft+' questions remaining';
      if(qLeft>0){input.disabled=false;send.disabled=false;}
      var err=document.createElement('div');err.className='ai-msg bot';err.textContent='Connection issue — try again!';msgs.appendChild(err);
    });
  }
  send.addEventListener('click',sendMsg);
  input.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
  return w;
}

FOLDERS.forEach(function(f,i){
  var win=null;
  if(f.type==='window') win=makeWin(f);
  else if(f.type==='iframe') win=makeIframeWin(f);
  var pos=getPos(f);
  var ic=document.createElement('div');ic.className='w95-icon';
  ic.appendChild(makeIcon(f.icon,f.photoUrl));
  var lbl=document.createElement('div');lbl.className='w95-icon-label';lbl.textContent=f.name;ic.appendChild(lbl);
  ic.style.cssText='left:'+pos.x+'px;top:'+pos.y+'px;z-index:'+(500+i)+';';
  var dragging=false,moved=false,ox=0,oy=0,sx=0,sy=0,lastTap=0;
  function openItem(){
    showHourglass();
    setTimeout(function(){
      if(f.type==='newpage'){window.open(f.url,'_blank');return;}
      if(f.type==='aiwin'){openAIWin();return;}
      if(win){win.classList.add('open');bringToFront(win);if(win._iframe&&win._iframe.src==='about:blank')win._iframe.src=win._iframeUrl;}
      else if(f.url&&f.url.indexOf('INSERISCI')<0) window.location.href=f.url;
    },400);
  }
  function startDrag(cx,cy){dragging=true;moved=false;ox=cx-ic.offsetLeft;oy=cy-ic.offsetTop;sx=cx;sy=cy;ic.style.zIndex=++zTop;document.querySelectorAll('.w95-icon').forEach(function(w){w.classList.remove('sel');});ic.classList.add('sel');}
  function doDrag(cx,cy){if(!dragging)return;if(Math.abs(cx-sx)>6||Math.abs(cy-sy)>6)moved=true;ic.style.left=Math.max(0,cx-ox)+'px';ic.style.top=Math.max(0,cy-oy)+'px';}
  function endDrag(){if(!dragging)return;dragging=false;if(!moved){if(isMobile){openItem();}else{var now=Date.now();if(now-lastTap<500)openItem();lastTap=now;}}}
  ic.addEventListener('mousedown',function(e){e.preventDefault();startDrag(e.clientX,e.clientY);});
  ic.addEventListener('touchstart',function(e){e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  document.addEventListener('mousemove',function(e){doDrag(e.clientX,e.clientY);});
  document.addEventListener('touchmove',function(e){if(dragging)doDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('mouseup',endDrag);
  document.addEventListener('touchend',endDrag);
  iconLayer.appendChild(ic);
});

document.addEventListener('click',function(e){
  if(!e.target.closest('.w95-icon'))document.querySelectorAll('.w95-icon').forEach(function(w){w.classList.remove('sel');});
  if(!e.target.closest('#w95-start')&&!e.target.closest('#w95-start-menu'))document.getElementById('w95-start-menu').classList.remove('open');
});
