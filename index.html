<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#008080;overflow:hidden;}
#w95-layer{position:fixed;inset:0;pointer-events:none;z-index:99999;font-family:'IBM Plex Mono',monospace;}
#w95-taskbar{position:fixed;bottom:0;left:0;right:0;height:30px;background:#c0c0c0;border-top:1px solid #fff;display:flex;align-items:center;padding:0 6px;gap:4px;pointer-events:all;z-index:100;}
#w95-start{height:22px;padding:0 10px;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:5px;pointer-events:all;letter-spacing:0.05em;}
#w95-start:active{border-color:#808080 #fff #fff #808080;}
#w95-start-logo{width:14px;height:14px;display:grid;grid-template-columns:1fr 1fr;gap:1px;flex-shrink:0;}
#w95-start-logo span{display:block;}
#w95-taskbar-social{display:flex;align-items:center;gap:2px;margin-left:4px;}
.w95-social-btn{width:22px;height:22px;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:all;text-decoration:none;flex-shrink:0;}
.w95-social-btn:active{border-color:#808080 #fff #fff #808080;}
#w95-clock{margin-left:auto;height:22px;padding:0 10px;background:#c0c0c0;border:1px solid;border-color:#808080 #fff #fff #808080;font-size:11px;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;letter-spacing:0.1em;pointer-events:all;white-space:nowrap;}
#w95-start-menu{position:fixed;bottom:30px;left:0;width:220px;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;display:none;flex-direction:row;pointer-events:all;z-index:200;box-shadow:2px 2px 0 #000;}
#w95-start-menu.open{display:flex;}
#w95-start-menu-stripe{width:22px;background:#000080;display:flex;align-items:flex-end;padding:6px 4px;writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:#c0c0c0;font-weight:700;letter-spacing:3px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
#w95-start-menu-items{flex:1;padding:4px 0;overflow-y:auto;max-height:80vh;}
.w95-menu-item{padding:5px 14px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;font-family:'IBM Plex Mono',monospace;letter-spacing:0.02em;}
.w95-menu-item:hover{background:#000080;color:#fff;}
.w95-menu-sep{height:1px;background:#808080;margin:3px 8px;}
.w95-icon{position:absolute;pointer-events:all;cursor:default;text-align:center;width:64px;}
.w95-icon-img{margin:0 auto;display:block;image-rendering:auto;}
.w95-icon-img.square{width:52px;height:52px;object-fit:contain;object-position:center center;border:1px solid rgba(0,0,0,0.3);background:#111;}
.w95-icon-img.natural{width:auto;max-width:64px;height:auto;max-height:80px;object-fit:contain;border:1px solid rgba(0,0,0,0.3);}
.w95-icon-label{margin-top:3px;font-size:9px;color:#fff;text-shadow:1px 1px 0 #000,0 0 4px rgba(0,0,0,0.8);line-height:1.3;word-break:break-word;font-family:'IBM Plex Mono',monospace;letter-spacing:0.02em;}
.w95-icon.sel .w95-icon-label{background:#000080;color:#fff;}
.w95-icon.sel .w95-icon-img{opacity:0.75;outline:1px solid #000080;}
.w95-win{position:fixed;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;box-shadow:2px 2px 0 #000;display:none;flex-direction:column;pointer-events:all;min-width:200px;}
.w95-win.open{display:flex;}
.w95-winbar{height:20px;background:linear-gradient(to right,#000080,#1084d0);display:flex;align-items:center;padding:0 4px;cursor:grab;user-select:none;flex-shrink:0;}
.w95-winbar:active{cursor:grabbing;}
.w95-wintitle{flex:1;font-size:11px;color:#fff;font-weight:700;pointer-events:none;white-space:nowrap;overflow:hidden;font-family:'IBM Plex Mono',monospace;letter-spacing:0.05em;}
.w95-winbtns{display:flex;gap:2px;}
.w95-wbtn{width:16px;height:14px;background:#c0c0c0;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;padding:0;border:1px solid;border-color:#fff #808080 #808080 #fff;line-height:1;}
.w95-wbtn:active{border-color:#808080 #fff #fff #808080;}
.w95-winbody{flex:1;overflow:hidden;background:#c0c0c0;font-size:12px;color:#000;font-family:'IBM Plex Mono',monospace;}
.w95-winbody.padded{padding:16px;overflow-y:auto;}
.w95-winbody iframe{width:100%;height:100%;border:none;display:block;}
.w95-winbody h1{font-size:13px;font-weight:700;margin-bottom:4px;color:#000;letter-spacing:0.05em;}
.w95-winbody h2{font-size:10px;font-weight:400;color:#555;margin-bottom:14px;letter-spacing:0.04em;}
.w95-winbody p{font-size:11px;color:#222;line-height:1.8;margin-bottom:8px;}
.w95-winbody a{color:#000080;font-size:11px;display:block;margin-bottom:8px;text-decoration:none;letter-spacing:0.02em;}
.w95-winbody a:hover{text-decoration:underline;}
.w95-win-openlink{display:block;text-align:center;font-size:10px;font-family:'IBM Plex Mono',monospace;background:#c0c0c0;border-top:1px solid #808080;padding:4px;color:#000080;cursor:pointer;text-decoration:none;flex-shrink:0;}
.w95-win-openlink:hover{background:#000080;color:#fff;}
.w95-resize{position:absolute;right:0;bottom:0;width:14px;height:14px;cursor:se-resize;opacity:0.5;}
#w95-hourglass{position:fixed;inset:0;background:#008080;z-index:999999;display:flex;align-items:center;justify-content:center;pointer-events:all;transition:opacity 0.6s;}
#w95-hourglass-inner{font-family:'IBM Plex Mono',monospace;color:#fff;font-size:28px;animation:hgspin 1s linear infinite;}
@keyframes hgspin{0%{transform:rotate(0deg);}50%{transform:rotate(180deg);}100%{transform:rotate(180deg);}  }
.w95-taskbtn{height:22px;padding:0 8px;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;max-width:130px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;pointer-events:all;letter-spacing:0.02em;}
.w95-taskbtn.active{border-color:#808080 #fff #fff #808080;background:#b0b0b0;}
@media(max-width:768px){
  .w95-icon{width:56px;}
  .w95-icon-img.square{width:44px;height:44px;}
  .w95-icon-label{font-size:8px;}
  #w95-start-menu{width:180px;}
}
</style>
</head>
<body>

  <div id="w95-taskbar">
    <button id="w95-start">
      <div id="w95-start-logo">
        <span style="background:#f00;width:100%;height:100%;"></span>
        <span style="background:#0f0;width:100%;height:100%;"></span>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="#000" stroke="none"/></svg>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="#000"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </a>
    </div>
    <div id="w95-taskbtns" style="display:flex;gap:2px;flex:1;overflow:hidden;"></div>
    <div id="w95-clock">00:00</div>
    <div id="w95-start-menu">
      <div id="w95-start-menu-stripe">Simone Falcomer</div>
      <div id="w95-start-menu-items"></div>
    </div>
  </div>
</div>

<script>
(function(){

  // Clessidra apertura sito
  var hg = document.getElementById('w95-hourglass');
  setTimeout(function(){
    hg.style.opacity='0';
    setTimeout(function(){hg.remove();},600);
  },1400);

  var W = window.innerWidth;
  var H = window.innerHeight;
  var isMobile = W < 768;
  var ICON = 64;
  var BOTTOM = 40;

  function mpos(col, row){
    var colW = Math.floor((W - 8) / 4);
    var rowH = Math.floor((H - 120 - BOTTOM) / 4);
    return { x: 4 + col * colW, y: 120 + row * rowH };
  }
  function dpos(px, py){
    return {
      x: Math.floor(px * (W - ICON) / 100),
      y: Math.floor(py * (H - ICON - BOTTOM) / 100)
    };
  }

  var FOLDERS = [
    {
      id:"about", name:"About", icon:"doc",
      type:"window", open:false,
      mob: mpos(0,0), dsk: dpos(3,4),
      winX:50, winY:30, winW:280, winH:210,
      content:'<div class="padded"><h1>Simone Falcomer</h1><h2>Photographer & Artist — Based in Barcelona</h2><p>Represented by <a href="#">Fang.Agency</a></p><p>For inquiries:<br><a href="mailto:falcomersimone@gmail.com">falcomersimone@gmail.com</a></p></div>'
    },
    {
      id:"info", name:"Info", icon:"pc",
      type:"iframe", url:"https://falcomersimone-cell.github.io/sito/info.html",
      mob: mpos(0,1), dsk: dpos(3,22),
    },
    {
      id:"ecommerce", name:"E-commerce", icon:"folder",
      type:"link", url:"INSERISCI_URL_QUI",
      mob: mpos(0,2), dsk: dpos(63,68),
    },
    {
      id:"work", name:"Work", icon:"folder",
      type:"link", url:"INSERISCI_URL_QUI",
      mob: mpos(0,3), dsk: dpos(14,75),
    },
    {
      id:"personal", name:"Personal Project", icon:"folder",
      type:"link", url:"INSERISCI_URL_QUI",
      mob: mpos(1,0), dsk: dpos(48,45),
    },
    {
      id:"marni", name:"Marni FW25", icon:"photo",
      photoUrl:"https://www.marni.com/dw/image/v2/AAPK_PRD/on/demandware.static/-/Library-Sites-marni-shared/default/dw13a0070c/FW25VOL.2/DETAILS__01__DSC1376.jpg?sw=3000",
      type:"iframe", url:"https://www.marni.com/en-us/marni-fw25-vol2.html",
      mob: mpos(1,1), dsk: dpos(34,8),
    },
    {
      id:"ed1", name:"Vein Magazine", icon:"photo",
      photoUrl:"https://vein.es/wp-content/uploads/2026/02/momentum-simone-falcomer1.jpg",
      type:"iframe", url:"https://vein.es/momentum-by-simone-falcomer/",
      mob: mpos(1,2), dsk: dpos(78,60),
    },
    {
      id:"ed7", name:"Vein Magazine", icon:"photo",
      photoUrl:"https://vein.es/wp-content/uploads/2025/12/Outsiders-division-kindergarden-riot-lookbook-veinmagazine49.jpg",
      type:"iframe", url:"https://vein.es/kindergarten-riot-outsiders-divisions-playful-rebellion-unveiled/outsiders-division-kindergarden-riot-lookbook-veinmagazine49/",
      mob: mpos(1,3), dsk: dpos(24,54),
    },
    {
      id:"ed2", name:"Cake Magazine", icon:"photo",
      photoUrl:"https://api.cake-mag.com/wp-content/uploads/2025/09/CAKEDIGITALMac-17-1483x1080.jpg",
      type:"iframe", url:"https://www.cake-mag.com/in-the-next-town-over",
      mob: mpos(2,0), dsk: dpos(57,80),
    },
    {
      id:"ed3", name:"Cake Magazine", icon:"photo",
      photoUrl:"https://api.cake-mag.com/wp-content/uploads/2025/10/CAKEDIGITALMac4-7-2048x1491.jpg",
      type:"iframe", url:"https://www.cake-mag.com/nobody-new",
      mob: mpos(2,1), dsk: dpos(44,28),
    },
    {
      id:"ed4", name:"Neo2 Magazine", icon:"photo",
      photoUrl:"https://www.neo2.com/wp-content/uploads/2024/12/bares-moda-tradicionales-barcelona-2025-1.jpg",
      type:"iframe", url:"https://www.neo2.com/los-bares-de-moda-de-barcelona-son-los-mas-tradicionales/",
      mob: mpos(2,2), dsk: dpos(7,46),
    },
    {
      id:"ed5", name:"Neo2 Magazine", icon:"photo",
      photoUrl:"https://www.neo2.com/wp-content/uploads/2025/05/editorial-moda-mentira-simone-falcomer-2.jpg",
      type:"iframe", url:"https://www.neo2.com/las-mentiras-de-la-moda-de-la-autoexpresion-al-autoengano/",
      mob: mpos(2,3), dsk: dpos(88,33),
    },
    {
      id:"ed6", name:"Neo2 Magazine", icon:"photo",
      photoUrl:"https://www.neo2.com/wp-content/uploads/2024/12/supermercados-moda-shopping-6.jpg",
      type:"iframe", url:"https://www.neo2.com/supermercados-de-amor-moda-estilismo/",
      mob: mpos(3,0), dsk: dpos(32,70),
    },
    {
      id:"vogue", name:"Vogue NL", icon:"vogue",
      photoUrl:"https://i.ibb.co/PvsXwLrF/IMG-8080.jpg",
      type:"window", open:false, showInTaskbar:false,
      mob: mpos(3,1), dsk: dpos(82,8),
      winX:30, winY:20, winW:250, winH:340,
      content:'<img src="https://i.ibb.co/PvsXwLrF/IMG-8080.jpg" style="width:100%;height:100%;object-fit:contain;display:block;background:#111;">'
    },
    {
      id:"acceptance", name:"Image Director at Acceptance Letter", icon:"photo",
      photoUrl:"https://cdn.shopify.com/s/files/1/0939/0037/4344/files/Acceptance_Letter02_227e9984-ee0c-419b-8916-3d944a49afea.jpg?v=1768844577",
      type:"iframe", url:"https://www.acceptanceletterstudio.eu/",
      mob: mpos(3,2), dsk: dpos(52,14),
    },
  ];

  function getPos(f){ return isMobile ? f.mob : f.dsk; }

  function makePCIcon(){
    var c=document.createElement('canvas');c.width=52;c.height=52;
    var x=c.getContext('2d');
    x.fillStyle='#c0c0c0';x.fillRect(6,4,40,28);
    x.fillStyle='#000080';x.fillRect(8,6,36,24);
    x.fillStyle='#000';x.fillRect(6,4,40,1);x.fillRect(6,31,40,1);x.fillRect(6,4,1,28);x.fillRect(45,4,1,28);
    x.fillStyle='#808080';x.fillRect(20,32,12,4);x.fillRect(16,36,20,3);
    x.fillStyle='#fff';x.fillRect(12,10,6,2);x.fillRect(12,14,18,2);x.fillRect(12,18,14,2);
    var img=document.createElement('img');img.src=c.toDataURL();
    img.style.cssText='width:52px;height:52px;display:block;margin:0 auto;';return img;
  }
  function makeVogueIcon(photoUrl){
    var img=document.createElement('img');img.src=photoUrl;img.className='w95-icon-img natural';return img;
  }
  function makeFolderIcon(){
    var c=document.createElement('canvas');c.width=46;c.height=40;
    var x=c.getContext('2d');
    x.fillStyle='#e8c000';x.fillRect(0,8,42,30);
    x.fillStyle='#ffd700';x.fillRect(0,4,16,6);
    x.fillStyle='#b89000';x.fillRect(0,36,42,2);x.fillRect(40,8,2,30);
    x.fillStyle='rgba(255,255,255,0.15)';x.fillRect(0,8,42,5);
    var img=document.createElement('img');img.src=c.toDataURL();
    img.style.cssText='width:42px;height:40px;display:block;margin:0 auto;';return img;
  }
  function makeDocIcon(){
    var c=document.createElement('canvas');c.width=36;c.height=46;
    var x=c.getContext('2d');
    x.fillStyle='#fff';x.fillRect(2,0,30,42);
    x.fillStyle='#000';
    x.fillRect(2,0,1,42);x.fillRect(31,0,1,42);
    x.fillRect(2,0,30,1);x.fillRect(2,41,30,1);
    x.fillStyle='#ddd';x.fillRect(22,0,10,10);
    x.fillStyle='#999';x.fillRect(22,0,10,1);x.fillRect(22,0,1,10);
    x.fillStyle='#333';
    for(var i=0;i<4;i++){x.fillRect(6,12+i*6,20,1);}
    var img=document.createElement('img');img.src=c.toDataURL();
    img.style.cssText='width:36px;height:46px;display:block;margin:0 auto;';return img;
  }
  function makeIcon(type,photoUrl){
    if(type==='pc') return makePCIcon();
    if(type==='vogue') return makeVogueIcon(photoUrl);
    if(type==='folder') return makeFolderIcon();
    if(type==='doc') return makeDocIcon();
    if(type==='photo'&&photoUrl){
      var img=document.createElement('img');img.src=photoUrl;
      img.className='w95-icon-img square';
      img.style.objectPosition='center center';
      return img;
    }
    return makeFolderIcon();
  }

  var iconLayer=document.getElementById('w95-icons');
  var winLayer=document.getElementById('w95-wins');
  var taskbtns=document.getElementById('w95-taskbtns');
  var menuItems=document.getElementById('w95-start-menu-items');
  var zTop=1000;
  function bringToFront(el){el.style.zIndex=++zTop;}

  function showHourglass(){
    var h=document.createElement('div');
    h.style.cssText='position:fixed;inset:0;background:rgba(0,128,128,0.5);z-index:999998;display:flex;align-items:center;justify-content:center;pointer-events:all;';
    h.innerHTML='<div style="font-size:24px;animation:hgspin 1s linear infinite;">⧗</div>';
    document.body.appendChild(h);
    setTimeout(function(){h.remove();},700);
  }

  function makeWin(f){
    var w=document.createElement('div');w.className='w95-win';
    var wW=isMobile?Math.min(W-20,340):400;
    var wH=isMobile?Math.min(H-80,500):440;
    w.style.cssText='left:20px;top:20px;width:'+wW+'px;height:'+wH+'px;z-index:'+(++zTop)+';';
    if(f.open) w.classList.add('open');
    var bar=document.createElement('div');bar.className='w95-winbar';
    var title=document.createElement('div');title.className='w95-wintitle';title.textContent=f.name;bar.appendChild(title);
    var btns=document.createElement('div');btns.className='w95-winbtns';
    function wbtn(label,fn){var b=document.createElement('button');b.className='w95-wbtn';b.textContent=label;b.addEventListener('click',function(e){e.stopPropagation();fn();});return b;}
    btns.appendChild(wbtn('_',function(){w.classList.remove('open');}));
    btns.appendChild(wbtn('□',function(){
      if(w._maximized){
        w.style.left=w._prevLeft;w.style.top=w._prevTop;w.style.width=w._prevW;w.style.height=w._prevH;w._maximized=false;
      } else {
        w._prevLeft=w.style.left;w._prevTop=w.style.top;w._prevW=w.style.width;w._prevH=w.style.height;
        w.style.left='0px';w.style.top='0px';w.style.width='100vw';w.style.height='calc(100vh - 30px)';w._maximized=true;
      }
    }));
    btns.appendChild(wbtn('✕',function(){w.classList.remove('open');}));
    bar.appendChild(btns);
    var body=document.createElement('div');body.className='w95-winbody';
    if(f.content) body.innerHTML=f.content;
    var rsz=document.createElement('div');rsz.className='w95-resize';
    rsz.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14"><path d="M14 0L0 14M14 7L7 14M14 11L11 14" stroke="#808080" stroke-width="1"/></svg>';
    var resizing=false,rsx=0,rsy=0,rsw=0,rsh=0;
    rsz.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();resizing=true;rsx=e.clientX;rsy=e.clientY;rsw=w.offsetWidth;rsh=w.offsetHeight;});
    document.addEventListener('mousemove',function(e){if(!resizing)return;w.style.width=Math.max(200,rsw+(e.clientX-rsx))+'px';w.style.height=Math.max(150,rsh+(e.clientY-rsy))+'px';});
    document.addEventListener('mouseup',function(){resizing=false;});
    w.appendChild(bar);w.appendChild(body);w.appendChild(rsz);
    w.addEventListener('mousedown',function(){bringToFront(w);});
    var bd=false,box=0,boy=0;
    bar.addEventListener('mousedown',function(e){if(e.target.closest('.w95-winbtns'))return;e.preventDefault();bd=true;box=e.clientX-w.offsetLeft;boy=e.clientY-w.offsetTop;bringToFront(w);});
    document.addEventListener('mousemove',function(e){if(!bd)return;w.style.left=Math.max(0,e.clientX-box)+'px';w.style.top=Math.max(0,e.clientY-boy)+'px';});
    document.addEventListener('mouseup',function(){bd=false;});
    winLayer.appendChild(w);return w;
  }

  function makeIframeWin(f){
    var w=makeWin(f);
    var body=w.querySelector('.w95-winbody');
    var iframe=document.createElement('iframe');
    iframe.src='about:blank';
    iframe.setAttribute('allowfullscreen','');
    body.appendChild(iframe);
    var openLink=document.createElement('a');
    openLink.href=f.url;openLink.target='_blank';
    openLink.className='w95-win-openlink';
    openLink.textContent='↗ Open in original website';
    w.appendChild(openLink);
    w._iframeUrl=f.url;
    w._iframe=iframe;
    return w;
  }

  var contactWin=(function(){
    var w=document.createElement('div');w.className='w95-win';
    w.style.cssText='left:50px;top:40px;width:270px;height:195px;z-index:'+(++zTop)+';';
    var bar=document.createElement('div');bar.className='w95-winbar';
    var title=document.createElement('div');title.className='w95-wintitle';title.textContent='Contact';bar.appendChild(title);
    var btns=document.createElement('div');btns.className='w95-winbtns';
    function wbtn(label,fn){var b=document.createElement('button');b.className='w95-wbtn';b.textContent=label;b.addEventListener('click',function(e){e.stopPropagation();fn();});return b;}
    btns.appendChild(wbtn('✕',function(){w.classList.remove('open');}));bar.appendChild(btns);
    var body=document.createElement('div');body.className='w95-winbody padded';
    body.innerHTML='<h1>Contact</h1><br>'
      +'<a href="https://www.instagram.com/simone_falcomer/" target="_blank">📷 Instagram</a>'
      +'<a href="https://wa.me/34607699642" target="_blank">📱 +34 607 699 642</a>'
      +'<a href="mailto:falcomersimone@gmail.com">✉️ falcomersimone@gmail.com</a>';
    var bd=false,box=0,boy=0;
    bar.addEventListener('mousedown',function(e){if(e.target.closest('.w95-winbtns'))return;e.preventDefault();bd=true;box=e.clientX-w.offsetLeft;boy=e.clientY-w.offsetTop;bringToFront(w);});
    document.addEventListener('mousemove',function(e){if(!bd)return;w.style.left=Math.max(0,e.clientX-box)+'px';w.style.top=Math.max(0,e.clientY-boy)+'px';});
    document.addEventListener('mouseup',function(){bd=false;});
    w.appendChild(bar);w.appendChild(body);
    w.addEventListener('mousedown',function(){bringToFront(w);});
    winLayer.appendChild(w);return w;
  })();

  FOLDERS.forEach(function(f){
    var item=document.createElement('div');item.className='w95-menu-item';
    item.textContent=(f.icon==='photo'||f.icon==='vogue'?'🖼 ':f.icon==='pc'?'💻 ':'📁 ')+f.name;
    item.addEventListener('click',function(){
      document.getElementById('w95-start-menu').classList.remove('open');
      if(f.type==='link'&&f.url&&f.url.indexOf('INSERISCI')<0) window.open(f.url,'_blank');
    });
    menuItems.appendChild(item);
  });
  var sep=document.createElement('div');sep.className='w95-menu-sep';menuItems.appendChild(sep);
  var ci=document.createElement('div');ci.className='w95-menu-item';ci.textContent='✉️ Contact';
  ci.addEventListener('click',function(){
    document.getElementById('w95-start-menu').classList.remove('open');
    contactWin.classList.add('open');bringToFront(contactWin);
  });
  menuItems.appendChild(ci);

  FOLDERS.forEach(function(f,i){
    var win=null;
    if(f.type==='window') win=makeWin(f);
    else if(f.type==='iframe') win=makeIframeWin(f);
    var pos=getPos(f);
    var ic=document.createElement('div');ic.className='w95-icon';
    ic.appendChild(makeIcon(f.icon,f.photoUrl));
    var lbl=document.createElement('div');lbl.className='w95-icon-label';lbl.textContent=f.name;
    ic.appendChild(lbl);
    ic.style.cssText='left:'+pos.x+'px;top:'+pos.y+'px;z-index:'+(500+i)+';';
    var dragging=false,moved=false,ox=0,oy=0,sx=0,sy=0,lastTap=0;

    function openItem(){
      showHourglass();
      setTimeout(function(){
        if(win){
          win.classList.add('open');
          bringToFront(win);
          if(win._iframe&&win._iframe.src==='about:blank') win._iframe.src=win._iframeUrl;
        } else if(f.type==='link'&&f.url&&f.url.indexOf('INSERISCI')<0){
          window.open(f.url,'_blank');
        }
      },400);
    }

    function startDrag(cx,cy){
      dragging=true;moved=false;
      ox=cx-ic.offsetLeft;oy=cy-ic.offsetTop;
      sx=cx;sy=cy;ic.style.zIndex=++zTop;
      document.querySelectorAll('.w95-icon').forEach(function(w){w.classList.remove('sel');});
      ic.classList.add('sel');
    }
    function doDrag(cx,cy){
      if(!dragging)return;
      if(Math.abs(cx-sx)>6||Math.abs(cy-sy)>6) moved=true;
      ic.style.left=Math.max(0,cx-ox)+'px';
      ic.style.top=Math.max(0,cy-oy)+'px';
    }
    function endDrag(){
      if(!dragging)return;
      dragging=false;
      if(!moved){
        if(isMobile){
          openItem();
        } else {
          var now=Date.now();
          if(now-lastTap<500) openItem();
          lastTap=now;
        }
      }
    }

    ic.addEventListener('mousedown',function(e){e.preventDefault();startDrag(e.clientX,e.clientY);});
    ic.addEventListener('touchstart',function(e){e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    document.addEventListener('mousemove',function(e){doDrag(e.clientX,e.clientY);});
    document.addEventListener('touchmove',function(e){if(dragging)doDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    document.addEventListener('mouseup',endDrag);
    document.addEventListener('touchend',endDrag);
    iconLayer.appendChild(ic);
  });

  document.addEventListener('click',function(e){
    if(!e.target.closest('.w95-icon'))
      document.querySelectorAll('.w95-icon').forEach(function(w){w.classList.remove('sel');});
    if(!e.target.closest('#w95-start')&&!e.target.closest('#w95-start-menu'))
      document.getElementById('w95-start-menu').classList.remove('open');
  });

  document.getElementById('w95-start').addEventListener('click',function(e){
    e.stopPropagation();
    document.getElementById('w95-start-menu').classList.toggle('open');
  });

  function updateClock(){
    var now=new Date();
    var h=now.getHours().toString().padStart(2,'0');
    var m=now.getMinutes().toString().padStart(2,'0');
    document.getElementById('w95-clock').textContent=h+':'+m;
  }
  updateClock();
  setInterval(updateClock,1000);

  // Frasi fantasma in posizioni e momenti diversi
  var PHRASES=[
    {text:'FREE PALESTINE',              top:'6%',  left:'50%', delay:4000,  interval:20000},
    {text:'DRAW THE TIME',               top:'22%', left:'12%', delay:8000,  interval:24000},
    {text:'I AM A GOOD MAN?',            top:'58%', left:'75%', delay:13000, interval:27000},
    {text:'AN IDEA, A CONCEPT, AN IDEA?',top:'78%', left:'35%', delay:6000,  interval:32000},
    {text:'FREE PALESTINE',              top:'42%', left:'82%', delay:22000, interval:21000},
    {text:'DRAW THE TIME',               top:'68%', left:'8%',  delay:16000, interval:29000},
    {text:'I AM A GOOD MAN?',            top:'15%', left:'60%', delay:30000, interval:35000},
    {text:'AN IDEA, A CONCEPT, AN IDEA?',top:'88%', left:'55%', delay:10000, interval:38000},
  ];

  PHRASES.forEach(function(p){
    var el=document.createElement('div');
    el.style.cssText='position:fixed;top:'+p.top+';left:'+p.left+';transform:translateX(-50%);font-family:IBM Plex Mono,monospace;font-size:clamp(9px,1.2vw,13px);color:rgba(255,255,255,0.14);letter-spacing:0.3em;pointer-events:none;z-index:99998;opacity:0;transition:opacity 3s ease;white-space:nowrap;';
    el.textContent=p.text;
    document.body.appendChild(el);
    function show(){el.style.opacity='1';setTimeout(function(){el.style.opacity='0';},4000);}
    setTimeout(function(){show();setInterval(show,p.interval);},p.delay);
  });

})();
</script>
