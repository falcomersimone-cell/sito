<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://simonefalcomer.art/favicon.png">
<link rel="shortcut icon" href="https://simonefalcomer.art/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer — Colour Archive</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#008080;font-family:'IBM Plex Mono',monospace;min-height:100%;}
.win{margin:20px auto;width:min(1100px,96vw);background:#c0c0c0;border:2px solid;border-color:#fff #808080 #808080 #fff;box-shadow:2px 2px 0 #000;display:flex;flex-direction:column;min-height:calc(100vh - 40px);}
.winbar{height:24px;background:linear-gradient(to right,#000080,#1084d0);display:flex;align-items:center;padding:0 6px;justify-content:space-between;flex-shrink:0;}
.wintitle{color:#fff;font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:0.05em;}
.winbtns{display:flex;gap:2px;}
.wbtn{width:16px;height:14px;background:#c0c0c0;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1px solid;border-color:#fff #808080 #808080 #fff;text-decoration:none;color:#000;}
.wbtn:hover{background:#e0e0e0;}
.menubar{display:flex;border-bottom:1px solid #808080;padding:2px 4px;font-size:11px;flex-shrink:0;}
.menubar span{padding:2px 8px;cursor:default;}
.menubar span:hover{background:#000080;color:#fff;}
.toolbar{display:flex;align-items:center;gap:4px;padding:4px 6px;border-bottom:1px solid #808080;flex-shrink:0;}
.tbtn{height:22px;padding:0 8px;background:#c0c0c0;border:1px solid;border-color:#fff #808080 #808080 #fff;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none;color:#000;}
.tbtn:hover{background:#d8d8d8;}
.address-bar{display:flex;align-items:center;gap:8px;padding:4px 6px;border-bottom:1px solid #808080;font-size:11px;flex-shrink:0;}
.address-label{color:#000;white-space:nowrap;}
.address-input{flex:1;padding:2px 6px;border:1px solid;border-color:#808080 #fff #fff #808080;background:#fff;font-size:11px;font-family:'IBM Plex Mono',monospace;color:#000;}
.winbody{flex:1;background:#fff;overflow:auto;padding:4px;}
#gallery{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.photo img{width:100%;height:auto;display:block;cursor:pointer;}
.statusbar{height:22px;border-top:1px solid #808080;display:flex;align-items:center;padding:0 8px;font-size:10px;color:#000;flex-shrink:0;}
.status-section{border:1px solid;border-color:#808080 #fff #fff #808080;padding:2px 8px;height:16px;display:flex;align-items:center;}
#top-btn{position:fixed;bottom:24px;right:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;color:rgba(255,255,255,0.45);background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.2);padding:6px 12px;cursor:pointer;z-index:500;transition:opacity 0.3s;text-decoration:none;}
#top-btn:hover{color:rgba(255,255,255,0.9);background:rgba(0,0,0,0.5);}
#bottom-back{text-align:center;padding:40px 20px;background:#c0c0c0;border-top:1px solid #808080;}
#bottom-back a{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;color:#000;text-decoration:none;}
#bottom-back a:hover{text-decoration:underline;}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:9999;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lb-img{max-width:95vw;max-height:95vh;object-fit:contain;}
#lb-close{position:fixed;top:16px;right:20px;color:#fff;font-size:24px;cursor:pointer;z-index:10000;}
#lb-prev,#lb-next{position:fixed;top:50%;transform:translateY(-50%);color:#fff;font-size:36px;cursor:pointer;z-index:10000;padding:16px;opacity:0.6;}
#lb-prev:hover,#lb-next:hover{opacity:1;}
#lb-prev{left:4px;}#lb-next{right:4px;}
</style>
</head>
<body>
<div class="win">
  <div class="winbar">
    <div class="wintitle">🖼 Colour Archive</div>
    <div class="winbtns">
      <div class="wbtn">_</div>
      <div class="wbtn">□</div>
      <a href="https://simonefalcomer.art/personal.html" class="wbtn">✕</a>
    </div>
  </div>
  <div class="menubar">
    <span>File</span><span>Edit</span><span>View</span><span>Help</span>
  </div>
  <div class="toolbar">
    <a href="https://simonefalcomer.art" class="tbtn">🏠 Home</a>
    <a href="https://simonefalcomer.art/personal.html" class="tbtn">← Back</a>
  </div>
  <div class="address-bar">
    <span class="address-label">Address:</span>
    <div class="address-input">C:\Simone\Personal Projects\Colour Archive</div>
  </div>
  <div class="winbody">
    <div id="gallery"></div>
  </div>
  <div class="statusbar">
    <div class="status-section" id="status">Loading...</div>
  </div>
  <div id="bottom-back">
    <a href="https://simonefalcomer.art/personal.html">← BACK TO PERSONAL PROJECTS</a>
  </div>
</div>
<a id="top-btn" href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">↑ TOP</a>
<div id="lightbox">
  <div id="lb-close">✕</div>
  <div id="lb-prev">‹</div>
  <img id="lb-img" src="">
  <div id="lb-next">›</div>
</div>
<script>
var BASE = 'https://falcomersimone-cell.github.io/sito/colour/';
var PHOTOS = [
  'Simone Falcomer Photography colour 1jpg.jpeg',
  'Simone Falcomer Photography colour 2.jpeg',
  'Simone Falcomer Photography colour 4.jpeg',
  '15.jpeg',
  '2179 - 2026.02.25 - Simone Falcomer - Prism 400 -20.jpeg',
  'Simone Falcomer Photography colour 5.jpeg',
  'Simone Falcomer Photography colour 6.jpeg',
  'Simone Falcomer Photography colour 9.jpeg',
  'Simone Falcomer Photography colour 8.jpeg',
  'Simone Falcomer Photography colour 10.jpeg',
  '_03A1795.jpeg',
  'Simone Falcomer Photography colour 11.jpeg',
  'Simone Falcomer Photography colour 12.jpeg',
  'Simone Falcomer Photography colour 13.jpeg',
  'Simone Falcomer Photography colour14.jpeg',
  'Simone Falcomer Photography colour 15.jpeg',
  'Simone Falcomer Photography colour16.jpeg',
  'Simone Falcomer Photography colour17.jpeg',
  'Simone Falcomer Photography colour 18.jpeg',
  'Simone Falcomer Photography colour19.jpeg',
  'Simone Falcomer Photography colour 20.jpeg',
  'Simone Falcomer Photography colour 21.jpeg',
  'Simone Falcomer Photography colour 22.jpeg',
  'Simone Falcomer Photography colour 23.jpeg',
  'Simone Falcomer Photography colour 24.jpeg',
  'Simone Falcomer Photography colour 25.jpeg',
  'Simone Falcomer Photography colour 26.jpeg',
  'Simone Falcomer Photography colour .jpeg',
  'Simone Falcomer Photography colour 29.jpeg',
  'Simone Falcomer Photography colour 30.jpeg',
  'Simone Falcomer Photography colour 31.jpeg',
  'Simone Falcomer Photography colour 32.jpeg',
  'Simone Falcomer Photography colour 33.jpeg',
  'Simone Falcomer Photography colour 34.jpeg',
  'Simone Falcomer Photography colour 35.jpeg',
];



var gallery = document.getElementById('gallery');
var lightbox = document.getElementById('lightbox');
var lbImg = document.getElementById('lb-img');
var status = document.getElementById('status');
var current = 0;
var loaded = 0;

PHOTOS.forEach(function(name, idx){
  var div = document.createElement('div');
  div.className = 'photo';
  var img = document.createElement('img');
  img.src = BASE + encodeURIComponent(name);
  img.loading = 'lazy';
  img.onerror = function(){ div.style.display='none'; };
  img.onload = function(){ loaded++; status.textContent = loaded + ' photos'; };
  img.onclick = function(){ current=idx; lbImg.src=img.src; lightbox.classList.add('open'); };
  div.appendChild(img);
  gallery.appendChild(div);
});

document.getElementById('lb-close').onclick = function(){ lightbox.classList.remove('open'); };
document.getElementById('lb-prev').onclick = function(){
  current=(current-1+PHOTOS.length)%PHOTOS.length;
  lbImg.src=BASE+encodeURIComponent(PHOTOS[current]);
};
document.getElementById('lb-next').onclick = function(){
  current=(current+1)%PHOTOS.length;
  lbImg.src=BASE+encodeURIComponent(PHOTOS[current]);
};
lightbox.onclick = function(e){ if(e.target===lightbox) lightbox.classList.remove('open'); };
document.addEventListener('keydown', function(e){
  if(!lightbox.classList.contains('open')) return;
  if(e.key==='Escape') lightbox.classList.remove('open');
  if(e.key==='ArrowLeft'){ current=(current-1+PHOTOS.length)%PHOTOS.length; lbImg.src=BASE+encodeURIComponent(PHOTOS[current]); }
  if(e.key==='ArrowRight'){ current=(current+1)%PHOTOS.length; lbImg.src=BASE+encodeURIComponent(PHOTOS[current]); }
});
</script>
</body>
</html>
