<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer — Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;font-family:'IBM Plex Mono',monospace;overflow:hidden;height:100%;}

#intro{
  position:fixed;inset:0;background:#000;z-index:2000;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
#intro-photo{
  position:absolute;top:50%;left:50%;
  width:140px;height:180px;
  transform:translate(-50%,-50%) scale(1);
  background-size:cover;background-position:center;
  opacity:0;
}
#loading-bar-wrap{
  position:absolute;bottom:18%;left:50%;
  transform:translateX(-50%);
  width:220px;text-align:center;z-index:10;
}
#loading-label{font-size:10px;letter-spacing:0.3em;color:#fff;margin-bottom:10px;opacity:0.8;}
#loading-track{width:100%;height:1px;background:rgba(255,255,255,0.2);position:relative;}
#loading-fill{height:1px;width:0%;background:#fff;position:absolute;left:0;top:0;}
#loading-pct{font-size:10px;letter-spacing:0.2em;color:#fff;margin-top:10px;opacity:0.6;}

#site{opacity:0;height:100%;}
#site.visible{opacity:1;transition:opacity 0.5s ease;}

header{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:#000;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;border-bottom:1px solid #222;
}
header a{color:#fff;font-size:11px;text-decoration:none;letter-spacing:0.1em;}
header span{color:#fff;font-size:11px;letter-spacing:0.15em;}

#slides{
  position:fixed;
  top:50px;left:0;right:0;bottom:0;
  overflow:hidden;
}
.slide{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transition:opacity 0.5s ease;
  pointer-events:none;
}
.slide.active{
  opacity:1;
  pointer-events:auto;
}
.slide img{
  max-width:92vw;
  max-height:92vh;
  object-fit:contain;
  cursor:pointer;
}

.nav-zone{
  position:fixed;top:50px;bottom:0;width:35%;
  z-index:50;cursor:pointer;
}
#nav-prev{left:0;}
#nav-next{right:0;}

#lightbox{display:none;position:fixed;inset:0;background:#000;z-index:999;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lightbox img{max-width:96vw;max-height:96vh;object-fit:contain;}
#lb-close{position:fixed;top:16px;right:20px;color:#fff;font-size:24px;cursor:pointer;z-index:1000;}
</style>
</head>
<body>

<div id="site" class="visible">
  <header>
    <a href="https://simonefalcomer.art">← BACK</a>
    <span>SIMONE FALCOMER</span>
    <span>BEAUTY</span>
  </header>

  <div id="slides"></div>
  <div class="nav-zone" id="nav-prev"></div>
  <div class="nav-zone" id="nav-next"></div>
</div>

<script>
var BASE = 'https://falcomersimone-cell.github.io/sito/beauty/';

var PHOTOS = [
  'Simone Falcomer Photography Beauty 1.jpeg',
  'Simone Falcomer Photography Beauty 2.jpeg',
  'Simone Falcomer Photography Beauty 3.jpeg',
  'Simone Falcomer Photography Beauty 4.jpeg',
  'Simone Falcomer Photography Beauty 5.jpeg',
  'Simone Falcomer Photography Beauty 6.jpeg',
  'Simone Falcomer Photography Beauty 7.jpeg',
  'Simone Falcomer Photography Beauty 8.jpeg',
  'Simone Falcomer Photography Beauty 9.jpeg',
  'Simone Falcomer Photography Beauty 10.jpeg',
  'Simone Falcomer Photography Beauty11.jpeg',
  'Simone Falcomer Photography Beauty 12.jpeg',
  'Simone Falcomer Photography Beauty 13.jpeg',
  'Simone Falcomer Photography Beauty 14.jpeg',
  'Simone Falcomer Photography Beauty 15.jpeg',
  'Simone Falcomer Photography Beauty 16.jpeg',
  'Simone Falcomer Photography Beauty 17.jpeg'
];

/* ===== SLIDESHOW: one photo at a time, fixed, no liquid effect ===== */
var slidesContainer = document.getElementById('slides');
var current = 0;

PHOTOS.forEach(function(name, idx){
  var slide = document.createElement('div');
  slide.className = 'slide' + (idx === 0 ? ' active' : '');
  slide.dataset.index = idx;
  var img = document.createElement('img');
  img.src = BASE + encodeURIComponent(name);
  slide.appendChild(img);
  slidesContainer.appendChild(slide);
});

var slideEls = document.querySelectorAll('.slide');

function goTo(idx){
  idx = (idx + PHOTOS.length) % PHOTOS.length;
  slideEls[current].classList.remove('active');
  current = idx;
  slideEls[current].classList.add('active');
}

var isTouch = 'ontouchstart' in window;

if(!isTouch){
  document.getElementById('nav-prev').addEventListener('click', function(){ goTo(current - 1); });
  document.getElementById('nav-next').addEventListener('click', function(){ goTo(current + 1); });
} else {
  document.getElementById('nav-prev').style.display = 'none';
  document.getElementById('nav-next').style.display = 'none';
}

/* Scroll wheel: shorter lock, lower threshold */
var scrollLock = false;
document.getElementById('slides').addEventListener('wheel', function(e){
  e.preventDefault();
  if(scrollLock) return;
  if(Math.abs(e.deltaY) < 8) return;
  scrollLock = true;
  if(e.deltaY > 0) goTo(current + 1);
  else goTo(current - 1);
  setTimeout(function(){ scrollLock = false; }, 280);
}, {passive:false});

/* Touch swipe */
var touchStartY = 0;
document.getElementById('slides').addEventListener('touchstart', function(e){
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('slides').addEventListener('touchend', function(e){
  var diff = touchStartY - e.changedTouches[0].clientY;
  if(Math.abs(diff) > 50){
    if(diff > 0) goTo(current + 1);
    else goTo(current - 1);
  }
}, {passive:true});

/* Keyboard arrows */
document.addEventListener('keydown', function(e){
  if(e.key === 'ArrowDown' || e.key === 'ArrowRight') goTo(current + 1);
  if(e.key === 'ArrowUp' || e.key === 'ArrowLeft') goTo(current - 1);
});
</script>

</body>
</html>
