<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer — Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;font-family:'IBM Plex Mono',monospace;overflow-x:hidden;}

#intro{
  position:fixed;inset:0;background:#000;z-index:2000;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
#intro-photo{
  position:absolute;top:50%;left:50%;
  width:140px;height:180px;
  transform:translate(-50%,-50%) scale(1);
  background-size:cover;background-position:center;
  opacity:0;
}
#loading-bar-wrap{
  position:absolute;bottom:18%;left:50%;
  transform:translateX(-50%);
  width:220px;text-align:center;z-index:10;
}
#loading-label{font-size:10px;letter-spacing:0.3em;color:#fff;margin-bottom:10px;opacity:0.8;}
#loading-track{width:100%;height:1px;background:rgba(255,255,255,0.2);position:relative;}
#loading-fill{height:1px;width:0%;background:#fff;position:absolute;left:0;top:0;}
#loading-pct{font-size:10px;letter-spacing:0.2em;color:#fff;margin-top:10px;opacity:0.6;}

#site{opacity:0;}
#site.visible{opacity:1;transition:opacity 0.5s ease;}

header{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:#000;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;border-bottom:1px solid #222;
}
header a{color:#fff;font-size:11px;text-decoration:none;letter-spacing:0.1em;}
header span{color:#fff;font-size:11px;letter-spacing:0.15em;}

.hero{padding:130px 20px 50px;text-align:center;}
.hero h1{font-family:'Playfair Display',serif;font-weight:900;font-size:60px;color:#fff;line-height:1;}

.photo-wrap{
  width:100%;text-align:center;padding:10px;
  overflow:hidden;
}
.photo-wrap img{
  max-width:100%;max-height:90vh;
  display:inline-block;cursor:pointer;
  transition:transform 0.15s ease-out, filter 0.15s ease-out;
  will-change:transform;
}

footer{text-align:center;padding:60px 20px;border-top:1px solid #222;}
footer p{color:#888;font-size:11px;letter-spacing:0.15em;margin-bottom:12px;}
footer a{color:#fff;font-size:14px;text-decoration:none;border-bottom:1px solid #fff;}

#lightbox{display:none;position:fixed;inset:0;background:#000;z-index:999;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;}
.lb-btn{position:fixed;color:#fff;font-size:30px;cursor:pointer;z-index:1000;padding:15px;}
#lb-close{top:10px;right:15px;font-size:24px;}
#lb-prev{left:5px;top:50%;transform:translateY(-50%);}
#lb-next{right:5px;top:50%;transform:translateY(-50%);}
</style>
</head>
<body>

<div id="intro">
  <div id="intro-photo"></div>
  <div id="loading-bar-wrap">
    <div id="loading-label">LOADING</div>
    <div id="loading-track"><div id="loading-fill"></div></div>
    <div id="loading-pct">0%</div>
  </div>
</div>

<div id="site">
  <header>
    <a href="https://simonefalcomer.art">← BACK</a>
    <span>SIMONE FALCOMER</span>
    <span>BEAUTY</span>
  </header>
  <div class="hero"><h1>BEAUTY</h1></div>
  <div id="gallery"></div>
  <footer>
    <p>FOR INQUIRIES</p>
    <a href="mailto:falcomersimone@gmail.com">falcomersimone@gmail.com</a>
  </footer>
</div>

<div id="lightbox">
  <div class="lb-btn" id="lb-close">✕</div>
  <div class="lb-btn" id="lb-prev">‹</div>
  <img id="lb-img" src="">
  <div class="lb-btn" id="lb-next">›</div>
</div>

<script>
var BASE = 'https://falcomersimone-cell.github.io/sito/beauty/';

var PHOTOS = [
  'Simone Falcomer Photography Beauty 1.jpeg',
  'Simone Falcomer Photography Beauty 2.jpeg',
  'Simone Falcomer Photography Beauty 3.jpeg',
  'Simone Falcomer Photography Beauty 4.jpeg',
  'Simone Falcomer Photography Beauty 5.jpeg',
  'Simone Falcomer Photography Beauty 6.jpeg',
  'Simone Falcomer Photography Beauty 7.jpeg',
  'Simone Falcomer Photography Beauty 8.jpeg',
  'Simone Falcomer Photography Beauty 9.jpeg',
  'Simone Falcomer Photography Beauty 10.jpeg',
  'Simone Falcomer Photography Beauty11.jpeg',
  'Simone Falcomer Photography Beauty 12.jpeg',
  'Simone Falcomer Photography Beauty 13.jpeg',
  'Simone Falcomer Photography Beauty 14.jpeg',
  'Simone Falcomer Photography Beauty 15.jpeg',
  'Simone Falcomer Photography Beauty 16.jpeg',
  'Simone Falcomer Photography Beauty 17.jpeg'
];

var INTRO_PHOTO = 'Simone Falcomer Photography Beauty 8.jpeg';

/* ===== INTRO: faster, less zoom ===== */
var fill = document.getElementById('loading-fill');
var pct = document.getElementById('loading-pct');
var introPhoto = document.getElementById('intro-photo');
var introEl = document.getElementById('intro');
var siteEl = document.getElementById('site');

var progress = 0;
var zoomStarted = false;

function tickLoading(){
  if(progress < 100){
    progress += Math.random() * 14 + 8;
    if(progress > 100) progress = 100;
    fill.style.width = progress + '%';
    pct.textContent = Math.floor(progress) + '%';
    setTimeout(tickLoading, 40);
  } else {
    finishIntro();
  }
}

function finishIntro(){
  document.getElementById('loading-bar-wrap').style.transition = 'opacity 0.25s';
  document.getElementById('loading-bar-wrap').style.opacity = '0';

  setTimeout(function(){
    introEl.style.transition = 'opacity 0.4s ease';
    introEl.style.opacity = '0';
    siteEl.classList.add('visible');
  }, 250);

  setTimeout(function(){
    introEl.style.display = 'none';
  }, 700);
}

function startZoomImmediately(){
  introPhoto.style.backgroundImage = 'url(' + BASE + encodeURIComponent(INTRO_PHOTO) + ')';
  introPhoto.style.transition = 'opacity 0.3s ease';
  introPhoto.style.opacity = '1';

  setTimeout(function(){
    introPhoto.style.transition = 'transform 0.9s cubic-bezier(0.6,0,0.2,1)';
    introPhoto.style.transform = 'translate(-50%,-50%) scale(7)';
  }, 50);
}

startZoomImmediately();
setTimeout(tickLoading, 100);

/* ===== GALLERY: plain img tags, liquid via CSS transform on hover/scroll ===== */
var gallery = document.getElementById('gallery');
var lightbox = document.getElementById('lightbox');
var lbImg = document.getElementById('lb-img');
var current = 0;
var imgEls = [];

PHOTOS.forEach(function(name, idx){
  var wrap = document.createElement('div');
  wrap.className = 'photo-wrap';
  var img = document.createElement('img');
  img.src = BASE + encodeURIComponent(name);
  img.loading = 'lazy';
  img.addEventListener('click', function(){
    current = idx;
    lbImg.src = img.src;
    lightbox.classList.add('open');
  });
  wrap.appendChild(img);
  gallery.appendChild(wrap);
  imgEls.push(img);

  // Liquid hover: subtle skew + scale, no color shift
  wrap.addEventListener('mousemove', function(e){
    var rect = wrap.getBoundingClientRect();
    var relX = (e.clientX - rect.left) / rect.width - 0.5;
    var relY = (e.clientY - rect.top) / rect.height - 0.5;
    img.style.transform = 'scale(1.03) skewX(' + (relX*3) + 'deg) skewY(' + (relY*1.5) + 'deg)';
  });
  wrap.addEventListener('mouseleave', function(){
    img.style.transform = 'scale(1) skewX(0deg) skewY(0deg)';
  });
});

/* Liquid on scroll: subtle skew based on scroll velocity */
var lastY = window.scrollY;
var velocity = 0;
window.addEventListener('scroll', function(){
  var y = window.scrollY;
  velocity = y - lastY;
  lastY = y;
  var amt = Math.max(-3, Math.min(3, velocity * 0.15));
  imgEls.forEach(function(img){
    img.style.transform = 'skewY(' + amt + 'deg)';
  });
  clearTimeout(window._scrollResetTimer);
  window._scrollResetTimer = setTimeout(function(){
    imgEls.forEach(function(img){ img.style.transform = 'skewY(0deg)'; });
  }, 150);
}, {passive:true});

/* ===== LIGHTBOX ===== */
document.getElementById('lb-close').onclick = function(){ lightbox.classList.remove('open'); };
document.getElementById('lb-prev').onclick = function(){
  current = (current - 1 + PHOTOS.length) % PHOTOS.length;
  lbImg.src = BASE + encodeURIComponent(PHOTOS[current]);
};
document.getElementById('lb-next').onclick = function(){
  current = (current + 1) % PHOTOS.length;
  lbImg.src = BASE + encodeURIComponent(PHOTOS[current]);
};
lightbox.onclick = function(e){ if(e.target === lightbox) lightbox.classList.remove('open'); };
</script>

</body>
</html>
