<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer — Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;font-family:'IBM Plex Mono',monospace;overflow:hidden;height:100%;overscroll-behavior:none;}

header{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:#000;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;border-bottom:1px solid #222;
}
header a{color:#fff;font-size:11px;text-decoration:none;letter-spacing:0.1em;}
header span{color:#fff;font-size:11px;letter-spacing:0.15em;}

#slides{
  position:fixed;
  top:50px;left:0;right:0;bottom:0;
  overflow:hidden;
  touch-action:none;
}
.slide{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transition:opacity 0.5s ease;
  pointer-events:none;
}
.slide.active{
  opacity:1;
  pointer-events:auto;
}
.slide img{
  max-width:92vw;
  max-height:92vh;
  object-fit:contain;
}

.nav-zone{
  position:fixed;top:50px;bottom:0;width:35%;
  z-index:50;cursor:pointer;
}
#nav-prev{left:0;}
#nav-next{right:0;}
</style>
</head>
<body>

<div id="site">
  <header>
    <a href="https://simonefalcomer.art">← BACK</a>
    <span>SIMONE FALCOMER</span>
    <span>BEAUTY</span>
  </header>
  <div id="slides"></div>
  <div class="nav-zone" id="nav-prev"></div>
  <div class="nav-zone" id="nav-next"></div>
</div>

<script>
var BASE = 'https://falcomersimone-cell.github.io/sito/beauty/';

var PHOTOS = [
  'Simone Falcomer Photography Beauty 1.jpeg',
  'Simone Falcomer Photography Beauty 2.jpeg',
  'Simone Falcomer Photography Beauty 3.jpeg',
  'Simone Falcomer Photography Beauty 4.jpeg',
  'Simone Falcomer Photography Beauty 5.jpeg',
  'Simone Falcomer Photography Beauty 6.jpeg',
  'Simone Falcomer Photography Beauty 7.jpeg',
  'Simone Falcomer Photography Beauty 8.jpeg',
  'Simone Falcomer Photography Beauty 9.jpeg',
  'Simone Falcomer Photography Beauty 10.jpeg',
  'Simone Falcomer Photography Beauty11.jpeg',
  'Simone Falcomer Photography Beauty 12.jpeg',
  'Simone Falcomer Photography Beauty 13.jpeg',
  'Simone Falcomer Photography Beauty 14.jpeg',
  'Simone Falcomer Photography Beauty 15.jpeg',
  'Simone Falcomer Photography Beauty 16.jpeg',
  'Simone Falcomer Photography Beauty 17.jpeg'
];

var slidesContainer = document.getElementById('slides');
var current = 0;

PHOTOS.forEach(function(name, idx){
  var slide = document.createElement('div');
  slide.className = 'slide' + (idx === 0 ? ' active' : '');
  var img = document.createElement('img');
  img.src = BASE + encodeURIComponent(name);
  img.loading = 'lazy';
  slide.appendChild(img);
  slidesContainer.appendChild(slide);
});

var slideEls = document.querySelectorAll('.slide');

function goTo(idx){
  idx = (idx + PHOTOS.length) % PHOTOS.length;
  slideEls[current].classList.remove('active');
  current = idx;
  slideEls[current].classList.add('active');
}

var isTouch = 'ontouchstart' in window;

if(!isTouch){
  document.getElementById('nav-prev').addEventListener('click', function(){ goTo(current - 1); });
  document.getElementById('nav-next').addEventListener('click', function(){ goTo(current + 1); });
} else {
  document.getElementById('nav-prev').style.display = 'none';
  document.getElementById('nav-next').style.display = 'none';
}

/* Scroll wheel desktop */
var scrollLock = false;
slidesContainer.addEventListener('wheel', function(e){
  e.preventDefault();
  if(scrollLock) return;
  if(Math.abs(e.deltaY) < 8) return;
  scrollLock = true;
  if(e.deltaY > 0) goTo(current + 1);
  else goTo(current - 1);
  setTimeout(function(){ scrollLock = false; }, 280);
}, {passive:false});

/* Touch swipe mobile — preventDefault on touchmove stops browser back-swipe */
var touchStartY = 0;
var touchStartX = 0;
slidesContainer.addEventListener('touchstart', function(e){
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
}, {passive:true});

slidesContainer.addEventListener('touchmove', function(e){
  e.preventDefault();
}, {passive:false});

slidesContainer.addEventListener('touchend', function(e){
  var diffY = touchStartY - e.changedTouches[0].clientY;
  var diffX = touchStartX - e.changedTouches[0].clientX;
  if(Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 40){
    if(diffY > 0) goTo(current + 1);
    else goTo(current - 1);
  }
}, {passive:true});

/* Keyboard */
document.addEventListener('keydown', function(e){
  if(e.key === 'ArrowDown' || e.key === 'ArrowRight') goTo(current + 1);
  if(e.key === 'ArrowUp' || e.key === 'ArrowLeft') goTo(current - 1);
});
</script>
</body>
</html>
