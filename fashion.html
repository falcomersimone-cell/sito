<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer — Fashion Work</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#fff;font-family:'IBM Plex Mono',monospace;}
#header{position:fixed;top:0;left:0;right:0;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:#fff;z-index:100;border-bottom:1px solid #eee;}
#header-title{font-size:11px;letter-spacing:0.2em;color:#000;font-weight:700;}
#back{font-size:11px;letter-spacing:0.1em;color:#000;text-decoration:none;}
#back:hover{opacity:0.5;}
#gallery{padding:70px 0 60px;columns:2;column-gap:3px;}
@media(min-width:768px){#gallery{columns:3;column-gap:4px;}}
@media(min-width:1200px){#gallery{columns:4;column-gap:4px;}}
.photo-wrap{break-inside:avoid;margin-bottom:4px;overflow:hidden;cursor:pointer;}
.photo-wrap img{width:100%;height:auto;display:block;transition:opacity 0.3s ease;}
.photo-wrap:hover img{opacity:0.85;}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;}
#lb-close{position:fixed;top:20px;right:24px;font-size:24px;color:#fff;cursor:pointer;z-index:1000;opacity:0.7;}
#lb-close:hover{opacity:1;}
#lb-prev,#lb-next{position:fixed;top:50%;transform:translateY(-50%);font-size:36px;color:#fff;cursor:pointer;z-index:1000;opacity:0.5;padding:20px;}
#lb-prev:hover,#lb-next:hover{opacity:1;}
#lb-prev{left:10px;}#lb-next{right:10px;}
</style>
</head>
<body>
<div id="header">
  <a href="https://simonefalcomer.art" id="back">← BACK</a>
  <div id="header-title">SIMONE FALCOMER — FASHION WORK</div>
</div>
<div id="gallery"></div>
<div id="lightbox">
  <div id="lb-close">✕</div>
  <div id="lb-prev">‹</div>
  <img id="lb-img" src="">
  <div id="lb-next">›</div>
</div>
<script>
var BASE='https://falcomersimone-cell.github.io/sito/fashion/';
var PHOTOS=[
  '_03A1146.jpg',
  '_03A1350.jpeg',
  '_03A1354.jpeg',
  '_DSC1337%20copy.jpeg',
  '_DSC1376.jpeg',
  '_DSC1828.jpeg',
  '_DSC1832%20copy.jpeg',
  '1.jpeg',
  '2%20copy.jpeg',
  '4.jpeg',
  '6.jpeg',
  '8.jpeg',
  '11.jpeg',
  '15.jpeg',
  '000015.jpeg',
  '000018.jpeg',
  '000022%202.jpeg',
  '000022.jpeg',
  '000033.jpeg',
  '000034.jpeg',
  '3182%20-%202025.5.3%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200%20-28.jpeg',
  '4054%20-%202026.03.03%20-%20Simone%20Falcomer%20-%20Ilford%20HP5-25.jpeg',
  '5688%20-%202025.06.11%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200-22%20copy.jpeg',
  '5689%20-%202025.06.11%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200-24%20copy.jpeg',
  '5689%20-%202025.06.11%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200-27%20copy.jpeg',
  '5689%20-%202025.06.11%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200-31%20copy.jpeg',
  '6153%20-%202025.06.19%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200-28.jpeg',
  '6154%20-%202025.06.19%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200-20.jpeg',
  '6155%20-%202025.06.19%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200-2.jpeg',
  '6155%20-%202025.06.19%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200-28.jpg',
  '7810%20-%202025.07.12%20-%20Simone%20Falcomer%20-%20Kodak%20Gold%20200%20-8%20copy.jpeg',
  '090325%20simone0643%20copy.jpeg',
  '090325%20simone1080%20copy.jpeg',
  'Acceptance%20Letter11%202.jpeg',
  'Acceptance%20Letter25.jpeg',
  'chabe3226.jpeg',
  'chabe3269%201.jpeg',
  'Edito%20Sarah%20Beauty5226.jpeg',
  'extra3.jpeg',
  'TEST202602204769.jpeg',
  'yd%201.jpeg',
  'yd%208.jpeg',
  'yd%2012.jpeg',
  'yd%2038.jpeg',
  'yd%2054.jpeg',
];
var gallery=document.getElementById('gallery');
var lightbox=document.getElementById('lightbox');
var lbImg=document.getElementById('lb-img');
var currentIndex=0;
PHOTOS.forEach(function(name,i){
  var wrap=document.createElement('div');wrap.className='photo-wrap';
  var img=document.createElement('img');
  img.src=BASE+name;
  img.loading='lazy';img.alt='';
  img.addEventListener('click',function(){openLightbox(i);});
  wrap.appendChild(img);gallery.appendChild(wrap);
});
function openLightbox(i){currentIndex=i;lbImg.src=BASE+PHOTOS[i];lightbox.classList.add('open');}
function closeLightbox(){lightbox.classList.remove('open');}
document.getElementById('lb-close').addEventListener('click',closeLightbox);
document.getElementById('lb-prev').addEventListener('click',function(){currentIndex=(currentIndex-1+PHOTOS.length)%PHOTOS.length;lbImg.src=BASE+PHOTOS[currentIndex];});
document.getElementById('lb-next').addEventListener('click',function(){currentIndex=(currentIndex+1)%PHOTOS.length;lbImg.src=BASE+PHOTOS[currentIndex];});
lightbox.addEventListener('click',function(e){if(e.target===lightbox)closeLightbox();});
document.addEventListener('keydown',function(e){
  if(!lightbox.classList.contains('open'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft'){currentIndex=(currentIndex-1+PHOTOS.length)%PHOTOS.length;lbImg.src=BASE+PHOTOS[currentIndex];}
  if(e.key==='ArrowRight'){currentIndex=(currentIndex+1)%PHOTOS.length;lbImg.src=BASE+PHOTOS[currentIndex];}
});
</script>
</body>
</html>
