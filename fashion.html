<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer — Fashion Work</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#fff;font-family:'IBM Plex Mono',monospace;}

#header{
  position:fixed;top:0;left:0;right:0;
  padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;z-index:100;
  border-bottom:1px solid #eee;
}
#header-title{font-size:11px;letter-spacing:0.2em;color:#000;font-weight:700;}
#back{
  font-size:11px;letter-spacing:0.1em;color:#000;
  text-decoration:none;
}
#back:hover{opacity:0.5;}

#gallery{
  padding:80px 0 60px;
  columns:2;column-gap:3px;
}
@media(min-width:768px){
  #gallery{columns:3;column-gap:4px;}
}
@media(min-width:1200px){
  #gallery{columns:4;column-gap:4px;}
}

.photo-wrap{
  break-inside:avoid;
  margin-bottom:4px;
  overflow:hidden;
  cursor:pointer;
}
.photo-wrap img{
  width:100%;
  height:auto;
  display:block;
  transition:opacity 0.3s ease;
}
.photo-wrap:hover img{opacity:0.85;}

/* Lightbox */
#lightbox{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.95);
  z-index:999;
  align-items:center;
  justify-content:center;
}
#lightbox.open{display:flex;}
#lightbox img{
  max-width:90vw;max-height:90vh;
  object-fit:contain;
}
#lb-close{
  position:fixed;top:20px;right:24px;
  font-size:24px;color:#fff;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  z-index:1000;opacity:0.7;
}
#lb-close:hover{opacity:1;}
#lb-prev,#lb-next{
  position:fixed;top:50%;transform:translateY(-50%);
  font-size:28px;color:#fff;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  z-index:1000;opacity:0.5;padding:20px;
}
#lb-prev:hover,#lb-next:hover{opacity:1;}
#lb-prev{left:10px;}
#lb-next{right:10px;}
</style>
</head>
<body>

<div id="header">
  <a href="https://simonefalcomer.art" id="back">← BACK</a>
  <div id="header-title">SIMONE FALCOMER — FASHION WORK</div>
</div>

<div id="gallery"></div>

<div id="lightbox">
  <div id="lb-close">✕</div>
  <div id="lb-prev">‹</div>
  <img id="lb-img" src="">
  <div id="lb-next">›</div>
</div>

<script>
var BASE = 'https://falcomersimone-cell.github.io/sito/fashion/';

var PHOTOS = [
  '_03A1146.jpg',
  '_03A1350.jpeg',
  '_03A1354.jpeg',
  '_DSC1337 copy.jpeg',
  '_DSC1376.jpeg',
  '_DSC1828.jpeg',
  '_DSC1832 copy.jpeg',
  '1.jpeg',
  '2 copy.jpeg',
  '4.jpeg',
  '6.jpeg',
  '8.jpeg',
  '11.jpeg',
  '15.jpeg',
  '000015.jpeg',
  '000018.jpeg',
  '000022 2.jpeg',
  '000022.jpeg',
  '000033.jpeg',
  '000034.jpeg',
  '3182 - 2025.5.3 - Simone Falcomer - Kodak Gold 200 -28.jpeg',
  '4054 - 2026.03.03 - Simone Falcomer - Ilford HP5-25.jpeg',
  '5688 - 2025.06.11 - Simone Falcomer - Kodak Gold 200-22 copy.jpeg',
  '5689 - 2025.06.11 - Simone Falcomer - Kodak Gold 200-24 copy.jpeg',
  '5689 - 2025.06.11 - Simone Falcomer - Kodak Gold 200-27 copy.jpeg',
  '5689 - 2025.06.11 - Simone Falcomer - Kodak Gold 200-31 copy.jpeg',
  '6153 - 2025.06.19 - Simone Falcomer - Kodak Gold 200-28.jpeg',
  '6154 - 2025.06.19 - Simone Falcomer - Kodak Gold 200-20.jpeg',
  '6155 - 2025.06.19 - Simone Falcomer - Kodak Gold 200-2.jpeg',
  '6155 - 2025.06.19 - Simone Falcomer - Kodak Gold 200-28.jpg',
  '7810 - 2025.07.12 - Simone Falcomer - Kodak Gold 200 -8 copy.jpeg',
  '090325 simone0643 copy.jpeg',
  '090325 simone1080 copy.jpeg',
  'Acceptance Letter11 2.jpeg',
  'Acceptance Letter25.jpeg',
  'chabe3226.jpeg',
  'chabe3269 1.jpeg',
  'Edito Sarah Beauty5226.jpeg',
  'extra3.jpeg',
  'TEST202602204769.jpeg',
  'yd 1.jpeg',
  'yd 8.jpeg',
  'yd 12.jpeg',
  'yd 38.jpeg',
  'yd 54.jpeg',
];

var gallery = document.getElementById('gallery');
var lightbox = document.getElementById('lightbox');
var lbImg = document.getElementById('lb-img');
var currentIndex = 0;

PHOTOS.forEach(function(name, i){
  var wrap = document.createElement('div');
  wrap.className = 'photo-wrap';
  var img = document.createElement('img');
  img.src = BASE + encodeURIComponent(name);
  img.loading = 'lazy';
  img.alt = '';
  img.addEventListener('click', function(){ openLightbox(i); });
  wrap.appendChild(img);
  gallery.appendChild(wrap);
});

function openLightbox(i){
  currentIndex = i;
  lbImg.src = BASE + encodeURIComponent(PHOTOS[i]);
  lightbox.classList.add('open');
}

function closeLightbox(){
  lightbox.classList.remove('open');
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', function(){
  currentIndex = (currentIndex - 1 + PHOTOS.length) % PHOTOS.length;
  lbImg.src = BASE + encodeURIComponent(PHOTOS[currentIndex]);
});
document.getElementById('lb-next').addEventListener('click', function(){
  currentIndex = (currentIndex + 1) % PHOTOS.length;
  lbImg.src = BASE + encodeURIComponent(PHOTOS[currentIndex]);
});

lightbox.addEventListener('click', function(e){
  if(e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', function(e){
  if(!lightbox.classList.contains('open')) return;
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowLeft'){ currentIndex=(currentIndex-1+PHOTOS.length)%PHOTOS.length; lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]); }
  if(e.key === 'ArrowRight'){ currentIndex=(currentIndex+1)%PHOTOS.length; lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]); }
});
</script>
</body>
</html>
