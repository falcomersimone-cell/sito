<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer — Fashion Work</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#fff;font-family:'IBM Plex Mono',monospace;}
#header{position:fixed;top:0;left:0;right:0;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:#fff;z-index:100;border-bottom:1px solid #eee;}
#header-title{font-size:11px;letter-spacing:0.2em;color:#000;font-weight:700;}
#back{font-size:11px;letter-spacing:0.1em;color:#000;text-decoration:none;}
#back:hover{opacity:0.5;}
#gallery{padding:90px 24px 80px;columns:2;column-gap:24px;}
@media(min-width:768px){#gallery{columns:3;column-gap:32px;padding:90px 40px 80px;}}
@media(min-width:1200px){#gallery{columns:4;column-gap:32px;}}
.photo-wrap{break-inside:avoid;margin-bottom:24px;overflow:hidden;cursor:pointer;}
.photo-wrap img{width:100%;height:auto;display:block;transition:opacity 0.3s ease;}
.photo-wrap:hover img{opacity:0.85;}
#sentinel{height:1px;}
#loading{text-align:center;padding:20px;font-size:10px;letter-spacing:0.2em;color:#999;display:none;}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;}
#lb-close{position:fixed;top:20px;right:24px;font-size:24px;color:#fff;cursor:pointer;z-index:1000;opacity:0.7;}
#lb-close:hover{opacity:1;}
#lb-prev,#lb-next{position:fixed;top:50%;transform:translateY(-50%);font-size:36px;color:#fff;cursor:pointer;z-index:1000;opacity:0.5;padding:20px;}
#lb-prev:hover,#lb-next:hover{opacity:1;}
#lb-prev{left:10px;}#lb-next{right:10px;}
</style>
</head>
<body>
<div id="header">
  <a href="https://simonefalcomer.art" id="back">← BACK</a>
  <div id="header-title">SIMONE FALCOMER — FASHION WORK</div>
</div>
<div id="gallery"></div>
<div id="sentinel"></div>
<div id="lightbox">
  <div id="lb-close">✕</div>
  <div id="lb-prev">‹</div>
  <img id="lb-img" src="">
  <div id="lb-next">›</div>
</div>
<script>
var BASE='https://falcomersimone-cell.github.io/sito/fashion/';

var PHOTOS=[];
for(var i=1;i<=44;i++){
  var ext = 'jpeg';
  if(i===18) ext='jpg';
  if(i===21) ext='JPG';
  if(i===25) ext='JPG';
  if(i===34) ext='JPG';
  PHOTOS.push('Simone Falcomer Fashion Photography '+i+'.'+ext);
}

var gallery=document.getElementById('gallery');
var lightbox=document.getElementById('lightbox');
var lbImg=document.getElementById('lb-img');
var currentIndex=0;

// Render iniziale
var renderedCount = 0;
var renderQueue = PHOTOS.slice();

function renderBatch(count){
  for(var b=0;b<count && renderQueue.length>0;b++){
    var name = renderQueue.shift();
    var realIndex = (renderedCount) % PHOTOS.length;
    addPhoto(name, renderedCount);
    renderedCount++;
  }
}

function addPhoto(name, idx){
  var wrap=document.createElement('div');wrap.className='photo-wrap';
  var img=document.createElement('img');
  img.src=BASE+encodeURIComponent(name);
  img.loading='lazy';img.alt='Simone Falcomer fashion photography';
  img.addEventListener('click',function(){openLightbox(idx % PHOTOS.length);});
  wrap.appendChild(img);gallery.appendChild(wrap);
}

renderBatch(PHOTOS.length);

// Infinite scroll - quando arrivi in fondo, ricarica le stesse foto
var sentinel = document.getElementById('sentinel');
var observer = new IntersectionObserver(function(entries){
  if(entries[0].isIntersecting){
    renderQueue = PHOTOS.slice();
    renderBatch(PHOTOS.length);
  }
}, {rootMargin: '400px'});
observer.observe(sentinel);

function openLightbox(i){currentIndex=i;lbImg.src=BASE+encodeURIComponent(PHOTOS[i]);lightbox.classList.add('open');}
function closeLightbox(){lightbox.classList.remove('open');}
document.getElementById('lb-close').addEventListener('click',closeLightbox);
document.getElementById('lb-prev').addEventListener('click',function(){currentIndex=(currentIndex-1+PHOTOS.length)%PHOTOS.length;lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]);});
document.getElementById('lb-next').addEventListener('click',function(){currentIndex=(currentIndex+1)%PHOTOS.length;lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]);});
lightbox.addEventListener('click',function(e){if(e.target===lightbox)closeLightbox();});
document.addEventListener('keydown',function(e){
  if(!lightbox.classList.contains('open'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft'){currentIndex=(currentIndex-1+PHOTOS.length)%PHOTOS.length;lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]);}
  if(e.key==='ArrowRight'){currentIndex=(currentIndex+1)%PHOTOS.length;lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]);}
});
</script>
</body>
</html>
