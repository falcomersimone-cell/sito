html,body{background:#fff;font-family:'IBM Plex Mono',monospace;}

#gallery{padding:70px 4px 60px;display:grid;grid-template-columns:1fr 1fr;gap:4px;}

footer{text-align:center;padding:60px 20px;border-top:1px solid #eee;}
footer p{color:#999;font-size:11px;letter-spacing:0.15em;margin-bottom:12px;}
footer a{color:#000;font-size:14px;text-decoration:none;border-bottom:1px solid #000;}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:999;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lb-img{max-width:95vw;max-height:95vh;object-fit:contain;}
#lb-close{position:fixed;top:16px;right:20px;color:#fff;font-size:24px;cursor:pointer;z-index:1000;}
#lb-prev,#lb-next{position:fixed;top:50%;transform:translateY(-50%);color:#fff;font-size:36px;cursor:pointer;z-index:1000;padding:16px;opacity:0.6;}
#lb-prev:hover,#lb-next:hover{opacity:1;}
#lb-prev{left:4px;}#lb-next{right:4px;}

var gallery = document.getElementById('gallery');
var lightbox = document.getElementById('lightbox');
var lbImg = document.getElementById('lb-img');
var current = 0;

PHOTOS.forEach(function(name, idx){
  var div = document.createElement('div');
  div.className = 'photo';
  var img = document.createElement('img');
  img.src = BASE + encodeURIComponent(name);
  img.loading = 'lazy';
  img.onerror = function(){ div.style.display='none'; };
  img.onclick = function(){ current=idx; lbImg.src=img.src; lightbox.classList.add('open'); };
  div.appendChild(img);
  gallery.appendChild(div);
});

document.getElementById('lb-close').onclick = function(){ lightbox.classList.remove('open'); };
document.getElementById('lb-prev').onclick = function(){
  current=(current-1+PHOTOS.length)%PHOTOS.length;
  lbImg.src=BASE+encodeURIComponent(PHOTOS[current]);
};
document.getElementById('lb-next').onclick = function(){
  current=(current+1)%PHOTOS.length;
  lbImg.src=BASE+encodeURIComponent(PHOTOS[current]);
};
lightbox.onclick = function(e){ if(e.target===lightbox) lightbox.classList.remove('open'); };
document.addEventListener('keydown', function(e){
  if(!lightbox.classList.contains('open')) return;
  if(e.key==='Escape') lightbox.classList.remove('open');
  if(e.key==='ArrowLeft'){ current=(current-1+PHOTOS.length)%PHOTOS.length; lbImg.src=BASE+encodeURIComponent(PHOTOS[current]); }
  if(e.key==='ArrowRight'){ current=(current+1)%PHOTOS.length; lbImg.src=BASE+encodeURIComponent(PHOTOS[current]); }
