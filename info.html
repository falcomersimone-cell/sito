<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone Falcomer — Fashion Work</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0a0a0a;font-family:'IBM Plex Mono',monospace;}

#header{
  position:fixed;top:0;left:0;right:0;
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,10,0.9);
  z-index:200;
}
#header-title{font-size:10px;letter-spacing:0.2em;color:#fff;font-weight:700;}
#back{font-size:10px;letter-spacing:0.1em;color:#fff;text-decoration:none;}
#back:hover{opacity:0.6;}
#counter-top{font-size:10px;letter-spacing:0.15em;color:#fff;}

#hero{padding:120px 20px 60px;text-align:center;}
#hero h1{
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:clamp(40px,11vw,140px);
  line-height:0.9;letter-spacing:-0.02em;
  color:#fff;
}

#gallery{padding:0 0 40px;}

.frame{
  width:100%;
  padding:20px 16px;
  text-align:center;
}
.frame img{
  max-width:100%;
  max-height:88vh;
  width:auto;
  height:auto;
  display:inline-block;
  cursor:pointer;
}

#footer-cta{
  text-align:center;
  background:#0a0a0a;
  padding:60px 24px 80px;
  border-top:1px solid rgba(255,255,255,0.1);
}
#footer-cta h2{
  font-size:11px;letter-spacing:0.25em;
  color:rgba(255,255,255,0.5);
  margin-bottom:16px;
  text-transform:uppercase;
}
#footer-cta a{
  font-size:14px;letter-spacing:0.1em;color:#fff;
  text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.4);
  padding-bottom:6px;
}

#lightbox{display:none;position:fixed;inset:0;background:#000;z-index:999;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lightbox img{max-width:94vw;max-height:94vh;object-fit:contain;}
#lb-close{position:fixed;top:16px;right:20px;font-size:22px;color:#fff;cursor:pointer;z-index:1000;}
#lb-prev,#lb-next{position:fixed;top:50%;transform:translateY(-50%);font-size:32px;color:#fff;cursor:pointer;z-index:1000;padding:16px;}
#lb-prev{left:4px;}#lb-next{right:4px;}
</style>
</head>
<body>
<div id="header">
  <a href="https://simonefalcomer.art" id="back">← BACK</a>
  <div id="header-title">SIMONE FALCOMER</div>
  <div id="counter-top">FASHION</div>
</div>

<div id="hero"><h1>FASHION<br>WORK</h1></div>

<div id="gallery"></div>

<div id="footer-cta">
  <h2>For inquiries</h2>
  <a href="mailto:falcomersimone@gmail.com">falcomersimone@gmail.com</a>
</div>

<div id="lightbox">
  <div id="lb-close">✕</div>
  <div id="lb-prev">‹</div>
  <img id="lb-img" src="">
  <div id="lb-next">›</div>
</div>

<script>
var BASE='https://falcomersimone-cell.github.io/sito/fashion/';
var EXT_OVERRIDES = {18:'jpg'};
var PHOTOS=[];
for(var i=1;i<=44;i++){
  var ext = EXT_OVERRIDES[i] || 'jpeg';
  PHOTOS.push('Simone Falcomer Fashion Photography '+i+'.'+ext);
}

var gallery=document.getElementById('gallery');
var lightbox=document.getElementById('lightbox');
var lbImg=document.getElementById('lb-img');
var currentIndex=0;

PHOTOS.forEach(function(name, idx){
  var frame=document.createElement('div');frame.className='frame';
  var img=document.createElement('img');
  img.src=BASE+encodeURIComponent(name);
  img.loading='lazy';
  img.alt='';
  img.addEventListener('click',function(){openLightbox(idx);});
  frame.appendChild(img);
  gallery.appendChild(frame);
});

function openLightbox(i){currentIndex=i;lbImg.src=BASE+encodeURIComponent(PHOTOS[i]);lightbox.classList.add('open');}
function closeLightbox(){lightbox.classList.remove('open');}
document.getElementById('lb-close').addEventListener('click',closeLightbox);
document.getElementById('lb-prev').addEventListener('click',function(){currentIndex=(currentIndex-1+PHOTOS.length)%PHOTOS.length;lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]);});
document.getElementById('lb-next').addEventListener('click',function(){currentIndex=(currentIndex+1)%PHOTOS.length;lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]);});
lightbox.addEventListener('click',function(e){if(e.target===lightbox)closeLightbox();});
document.addEventListener('keydown',function(e){
  if(!lightbox.classList.contains('open'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft'){currentIndex=(currentIndex-1+PHOTOS.length)%PHOTOS.length;lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]);}
  if(e.key==='ArrowRight'){currentIndex=(currentIndex+1)%PHOTOS.length;lbImg.src=BASE+encodeURIComponent(PHOTOS[currentIndex]);}
});
</script>
</body>
</html>
